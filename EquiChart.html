<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dentalis Vet — Odontograma Veterinário</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #efece3;
  --panel: #ffffff;
  --panel-2: #f7f5ee;
  --ink: #1d2a2a;
  --muted: #6c7672;
  --faint: #9aa39e;
  --line: #e4e0d4;
  --line-2: #ece8dc;
  --primary: #1d5f6b;
  --primary-d: #15484f;
  --primary-t: #e4eff0;
  --gold: #b8862f;
  --gold-d: #99701f;
  --danger: #d8443c;
  --amber: #e08a1e;
  --blue: #2f6fed;
  --shadow: 0 1px 2px rgba(29,42,42,.06), 0 8px 24px rgba(29,42,42,.06);
  --shadow-sm: 0 1px 2px rgba(29,42,42,.08);
  --radius: 14px;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: 'Hanken Grotesk', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  font-variant-numeric: tabular-nums;
}
#root { height: 100%; }
button { font-family: inherit; cursor: pointer; }
.eq-app { height: 100%; display: flex; flex-direction: column; }

/* ---------------- Header ---------------- */
.eq-header { background: var(--panel); border-bottom: 1px solid var(--line); flex: none; }
.eq-header-top {
  display: flex; align-items: center; gap: 22px;
  padding: 12px 22px;
}
.eq-brand { display: flex; align-items: center; gap: 10px; }
.eq-brand-name { font-weight: 800; font-size: 18px; letter-spacing: -.01em; line-height: 1; }
.eq-brand-sub { font-size: 11.5px; color: var(--muted); margin-top: 3px; font-weight: 500; }
.eq-logo { height: 42px; width: 42px; object-fit: contain; border-radius: 8px; flex: none; }
.eq-brand-name .gold { color: var(--gold); }
.eq-patient { flex: 1; padding-left: 22px; border-left: 1px solid var(--line); }
.eq-patient-name { font-weight: 700; font-size: 16px; }
.eq-patient-meta { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
.eq-header-actions { display: flex; gap: 8px; }

.eq-btn {
  display: inline-flex; align-items: center; gap: 7px;
  border: 1px solid var(--line); background: var(--panel); color: var(--ink);
  padding: 9px 14px; border-radius: 10px; font-weight: 600; font-size: 13.5px;
  transition: all .14s ease; white-space: nowrap;
}
.eq-btn:hover { border-color: #d3cdbe; background: var(--panel-2); }
.eq-btn.primary { background: var(--primary); border-color: var(--primary); color: #fff; }
.eq-btn.primary:hover { background: var(--primary-d); border-color: var(--primary-d); }
.eq-btn.ghost { background: transparent; }
.eq-btn.danger { color: var(--danger); border-color: #eccfcb; background: #fbf2f1; }
.eq-btn.danger:hover { background: #f7e6e4; }
.eq-btn.block { width: 100%; justify-content: center; }
.eq-btn:disabled { opacity: .4; cursor: not-allowed; }
.eq-ic { flex: none; }

/* ---------------- Stepper ---------------- */
.eq-stepper { display: flex; gap: 4px; padding: 0 16px 0; border-top: 1px solid var(--line-2); }
.eq-step {
  display: flex; align-items: center; gap: 9px; background: none; border: none;
  padding: 12px 16px; color: var(--muted); font-weight: 600; font-size: 13.5px;
  border-bottom: 2.5px solid transparent; margin-bottom: -1px;
}
.eq-step:hover { color: var(--ink); }
.eq-step.active { color: var(--primary); border-bottom-color: var(--primary); }
.eq-step-num {
  width: 21px; height: 21px; border-radius: 50%; background: var(--panel-2);
  border: 1px solid var(--line); display: grid; place-items: center;
  font-size: 12px; font-weight: 700; color: var(--muted);
}
.eq-step.active .eq-step-num { background: var(--primary); border-color: var(--primary); color: #fff; }

/* ---------------- Chart step layout ---------------- */
.eq-chart-step { flex: 1; min-height: 0; display: grid; grid-template-columns: 272px 1fr 300px; }
.eq-toolbar { border-right: 1px solid var(--line); background: var(--panel); overflow-y: auto; padding: 14px; }
.eq-stage { min-width: 0; overflow-x: hidden; overflow-y: auto; display: flex; flex-direction: column; align-items: center; padding: 22px 18px; }
.eq-side { border-left: 1px solid var(--line); background: var(--panel); overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 14px; }

/* ---------------- Toolbar ---------------- */
.eq-toolgroup { margin-bottom: 16px; }
.eq-toolgroup-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--faint); margin: 0 2px 8px; }
.eq-toolgrid { display: flex; flex-direction: column; gap: 5px; }
.eq-toolbtn {
  display: flex; align-items: center; gap: 9px; width: 100%; text-align: left;
  background: var(--panel); border: 1px solid var(--line); border-radius: 9px;
  padding: 6px 8px; transition: all .12s ease;
}
.eq-toolbtn:hover { border-color: #d3cdbe; background: var(--panel-2); }
.eq-toolbtn.active { border-color: var(--primary); background: var(--primary-t); box-shadow: inset 0 0 0 1px var(--primary); }
.eq-toolswatch {
  flex: none; width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center;
  color: #fff; font-size: 9.5px; font-weight: 800; letter-spacing: .01em;
}
.eq-toolswatch.cursor, .eq-toolswatch.erase { background: #41504c; font-size: 14px; }
.eq-toollabel { font-size: 12.5px; font-weight: 600; line-height: 1.15; }
.eq-pencolors { display: flex; gap: 6px; padding: 6px 2px 2px; }
.eq-pencolor { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--line); }
.eq-pencolor.active { box-shadow: 0 0 0 2px var(--primary); transform: scale(1.08); }
.eq-drawrow { display: flex; gap: 5px; }
.eq-drawbtn { flex: 1; height: 36px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 9px; background: var(--panel); color: var(--ink); }
.eq-drawbtn:hover { background: var(--panel-2); border-color: #d3cdbe; }
.eq-drawbtn.active { border-color: var(--primary); background: var(--primary-t); color: var(--primary-d); box-shadow: inset 0 0 0 1px var(--primary); }
.eq-drops { display: flex; gap: 6px; flex-wrap: wrap; }
.eq-dropbtn { width: 38px; height: 38px; display: grid; place-items: center; border: 1px solid var(--line); border-radius: 9px; background: var(--panel); }
.eq-dropbtn:hover { background: var(--panel-2); }
.eq-dropbtn.active { border-color: var(--primary); background: var(--primary-t); box-shadow: inset 0 0 0 1px var(--primary); }

/* ---------------- Autofit + chart canvas ---------------- */
.eq-autofit { width: 100%; }
.eq-autofit-inner { transform-origin: top center; margin: 0 auto; }
.eq-design { position: relative; width: 100%; display: flex; flex-direction: column; align-items: center; }
.eq-chart-canvas {
  position: relative; background: var(--panel); border: 1px solid var(--line);
  border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 18px;
  width: 100%; max-width: 960px;
}
.anat-svg { display: block; }
.anat-stage { position: relative; width: 100%; display: block; }
.anat-base { display: block; width: 100%; height: auto; user-select: none; -webkit-user-drag: none; }
.anat-hit { position: absolute; inset: 0; width: 100%; height: 100%; }
.anat-zone-hit { transition: fill .18s ease, stroke .18s ease, fill-opacity .18s ease, filter .18s ease; }
.anat-zone:hover .anat-zone-hit { fill:rgba(20,168,160,.10); stroke:rgba(15,143,136,.46); }
.anat-zone:focus { outline: none; }
.anat-zone:focus .anat-zone-hit, .anat-zone.is-selected .anat-zone-hit { fill:rgba(20,168,160,.12); stroke:#0f8f88; stroke-width:2; filter:drop-shadow(0 1px 2px rgba(15,143,136,.22)); animation:anatToothSelect 1.8s ease-in-out infinite; }
.anat-tooth-fill { transition: fill-opacity .22s ease, stroke-width .22s ease, filter .22s ease; animation: anatPaintIn .28s ease-out both; }
.anat-tooth-fill.is-selected { filter: drop-shadow(0 2px 3px rgba(15,143,136,.32)); }
@keyframes anatPaintIn { from { opacity:.25; fill-opacity:.12; } to { opacity:1; } }
@keyframes anatToothSelect { 0%,100% { fill-opacity:.42; stroke-opacity:.62; } 50% { fill-opacity:.72; stroke-opacity:1; } }
@media (prefers-reduced-motion: reduce) { .anat-tooth-fill, .anat-zone-hit { animation:none !important; transition:none; } }

/* ===================== Odontograma (layout VetTooth Pro) ===================== */
:root { --od-navy:#1a2e44; --od-teal:#00c9a7; --od-teal-d:#00a98c; --od-teal-t:#e0f7f2; --od-bg:#eef1f5; --od-line:#e7ebf0; --od-ink:#15293d; --od-muted:#67788c; --od-faint:#97a4b3; }
.od-app { height:100%; display:flex; flex-direction:column; background:var(--od-bg); color:var(--od-ink); font-family:'Hanken Grotesk',sans-serif; }
.od-header { background:#fff; border-bottom:1px solid var(--od-line); flex:none; }
.od-header-top { display:flex; align-items:center; justify-content:space-between; padding:12px 22px; }
.od-patient-sel { display:flex; align-items:center; gap:11px; }
.od-pet-ava { width:38px; height:38px; border-radius:10px; background:#a98467; color:#fff; display:grid; place-items:center; font-weight:800; font-size:16px; }
.od-patient-name { font-weight:700; font-size:15.5px; line-height:1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:340px; }
.od-patient-meta { font-size:12.5px; color:var(--od-muted); line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:340px; }
.od-header-actions { display:flex; align-items:center; gap:8px; }
.od-ic-btn { width:38px; height:38px; border-radius:10px; border:1px solid var(--od-line); background:#fff; color:var(--od-muted); display:grid; place-items:center; }
.od-ic-btn:hover:not(:disabled) { background:var(--od-bg); }
.od-ic-btn:disabled { opacity:.4; }
.od-save { background:var(--od-teal); color:#fff; font-weight:700; font-size:13.5px; padding:10px 16px; border-radius:10px; white-space:nowrap; }
.od-save:hover { filter:brightness(1.06); }
.od-stepper { display:flex; gap:6px; padding:4px 22px 0; overflow-x:auto; }
.od-step { display:flex; align-items:center; gap:9px; background:none; padding:12px 14px; color:var(--od-muted); font-weight:600; font-size:13.5px; border-bottom:2.5px solid transparent; white-space:nowrap; }
.od-step:hover { color:var(--od-ink); }
.od-step.active { color:var(--od-teal-d); border-bottom-color:var(--od-teal); }
.od-step-num { width:22px; height:22px; border-radius:50%; background:var(--od-bg); border:1px solid var(--od-line); display:grid; place-items:center; font-size:12px; font-weight:700; color:var(--od-muted); }
.od-step.active .od-step-num { background:var(--od-teal); border-color:var(--od-teal); color:#fff; }
.od-step.done .od-step-num { background:var(--od-teal-d); border-color:var(--od-teal-d); color:#fff; }
.od-step-label { display:flex; flex-direction:column; line-height:1.15; }
.od-step-sub { font-size:11px; font-weight:600; font-style:normal; opacity:.8; }

.od-main { flex:1; min-height:0; display:grid; grid-template-columns:1fr 312px; gap:18px; padding:18px 22px 26px; overflow-y:auto; }
.od-center { min-width:0; display:flex; flex-direction:column; gap:14px; }
.od-chart-card { background:#fff; border:1px solid var(--od-line); border-radius:16px; box-shadow:0 1px 2px rgba(16,40,61,.04),0 6px 20px rgba(16,40,61,.05); padding:18px 20px; }
.od-design { position:relative; width:100%; }
.od-chart-inner { position:relative; }
.od-chart-inner.hide-anat .anat-base { opacity:.12; }
.od-legend-strip { display:flex; flex-wrap:wrap; gap:8px 16px; justify-content:center; margin-top:8px; padding-top:14px; border-top:1px solid var(--od-line); }
.od-legend-pill { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:var(--od-ink); }
.od-dot { width:11px; height:11px; border-radius:50%; flex:none; }
.od-dot.ring { background:none; border:2px dashed #9aa6b2; }

/* toolbar */
.od-toolbar { display:flex; align-items:center; justify-content:space-between; gap:10px; background:#fff; border:1px solid var(--od-line); border-radius:14px; padding:8px; flex-wrap:wrap; }
.od-tools { display:flex; gap:3px; flex-wrap:wrap; }
.od-tools-right { display:flex; gap:3px; }
.od-tool { display:inline-flex; align-items:center; gap:7px; padding:9px 12px; border-radius:9px; font-weight:600; font-size:13px; color:var(--od-muted); background:none; }
.od-tool:hover:not(:disabled) { background:var(--od-bg); color:var(--od-ink); }
.od-tool.active { background:var(--od-teal); color:#fff; }
.od-tool.ghost { color:var(--od-faint); }
.od-tool:disabled { opacity:.4; }

/* bottom row */
.od-bottom { display:grid; grid-template-columns:1fr 200px 220px; gap:14px; align-items:start; }
.od-bottom-card { background:#fff; border:1px solid var(--od-line); border-radius:14px; padding:16px 18px; }
.od-bottom-card h4 { margin:0 0 12px; font-size:15px; font-weight:800; }
.od-bottom-empty { color:var(--od-muted); font-size:13px; margin:0; }
.od-summary-list { display:flex; flex-direction:column; gap:8px; }
.od-summary-row { display:flex; align-items:center; gap:9px; font-size:13px; }

/* Passo 1 — seleção de espécie & arcada (premium) */
.ode-sec-label { font-size:12.5px; font-weight:800; letter-spacing:.06em; text-transform:uppercase; color:var(--od-muted); margin:6px 2px 13px; }
.ode-cards { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:32px; }
.ode-card { position:relative; display:flex; flex-direction:column; align-items:center; gap:6px; padding:34px 20px 26px; border-radius:20px; border:2px solid var(--od-line); background:linear-gradient(160deg,#ffffff 0%,#f6f9fa 100%); box-shadow:0 1px 2px rgba(21,41,61,.04),0 10px 26px -16px rgba(21,41,61,.22); cursor:pointer; transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease; }

/* Passo — seleção responsável/paciente */

.od-step { color:rgba(255,255,255,.62); }

.od-step.active { color:#fff; border-bottom-color:var(--od-teal); }
.od-step-num { background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.22); color:rgba(255,255,255,.8); }
.od-step.active .od-step-num { background:var(--od-teal); border-color:var(--od-teal); color:#fff; }
.od-step.done { color:rgba(255,255,255,.82); }
.od-step.done .od-step-num { background:#2bb673; border-color:#2bb673; color:#fff; }
.od-progress { background:rgba(255,255,255,.14); }
.od-progress-fill { background:var(--od-teal); box-shadow:0 0 0 1px rgba(0,201,167,.35); }
.od-chart-card, .od-panel, .od-bottom-card, .od-card { box-shadow:0 2px 12px rgba(0,0,0,.08); }

/* ===== Arco dentário por espécie (cão/gato) ===== */
.sp-arch-wrap { padding:6px 4px 2px; }
.sp-arch-svg { display:block; width:100%; }
.sp-tooth:hover path:first-of-type { filter:brightness(.97); }
.sp-tnum { font-size:11px; font-weight:700; fill:#7c8896; font-family:'Hanken Grotesk',sans-serif; }
.sp-arch-side { font-size:12px; font-weight:800; letter-spacing:.12em; fill:#aab4c0; font-family:'Hanken Grotesk',sans-serif; }
.sp-arch-jaw { font-size:11px; font-weight:800; letter-spacing:.14em; fill:#b6bfca; font-family:'Hanken Grotesk',sans-serif; }
.sp-arch-badge { font-size:14px; font-weight:800; letter-spacing:.02em; fill:#c2cad4; font-family:'Hanken Grotesk',sans-serif; }
.sp-lat-cap { font-size:9.5px; font-weight:700; letter-spacing:.06em; fill:#9aa5b1; text-transform:uppercase; font-family:'Hanken Grotesk',sans-serif; }
.gx-mark text { transition:filter .1s; }
.gx-mark:hover text { filter:drop-shadow(0 0 3px rgba(239,68,68,.6)); }

/* ===== Passo 5 — dois painéis + prévia do laudo A4 ===== */
.p5-pane { max-width:1320px; }
.p5-grid { display:grid; grid-template-columns:38% 62%; gap:18px; align-items:start; }
.p5-left { display:flex; flex-direction:column; gap:14px; min-width:0; }
.p5-collapse { padding:0; overflow:hidden; }
.p5-collapse-head { width:100%; display:flex; align-items:center; justify-content:space-between; gap:12px; padding:16px 20px; background:none; border:none; text-align:left; }
.p5-collapse-head b { font-size:15.5px; font-weight:800; color:var(--od-ink); display:block; }
.p5-collapse-head i { font-size:12px; font-style:normal; color:var(--od-muted); display:block; margin-top:2px; }
.p5-collapse-head svg { color:var(--od-muted); transition:transform .2s ease; flex:none; }
.p5-collapse-head.open svg { transform:rotate(180deg); }
.p5-collapse-body { padding:0 20px 18px; display:flex; flex-direction:column; gap:18px; border-top:1px solid var(--od-line); }
.p5-collapse-body .og-block { margin-top:14px; }
.p5-collapse-body .og-find-groups { grid-template-columns:1fr; }
.p5-fields { display:flex; flex-direction:column; gap:14px; }
.p5-field { display:flex; flex-direction:column; gap:6px; }
.p5-field span { font-size:13px; font-weight:700; color:var(--od-ink); }
.p5-field textarea { font-family:inherit; font-size:13.5px; border:1px solid var(--od-line); border-radius:10px; padding:10px 12px; resize:vertical; min-height:64px; background:#fff; color:var(--od-ink); }
.p5-field textarea:focus { outline:none; border-color:var(--od-teal); box-shadow:0 0 0 3px rgba(0,201,167,.12); }

.p5-right { position:sticky; top:0; }
.p5-right-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.p5-right-head span { font-size:13px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--od-muted); }
.p5-paper-scroll { background:#dfe4ea; border-radius:14px; padding:22px; max-height:calc(100vh - 220px); overflow-y:auto; box-shadow:inset 0 1px 4px rgba(16,40,61,.08); }
.laudo-paper { background:#fff; width:100%; max-width:620px; margin:0 auto; border-radius:3px; box-shadow:0 6px 24px rgba(16,40,61,.16); padding:46px 50px 40px; min-height:780px; font-size:13px; color:#26323f; }
.laudo-head { text-align:center; border-bottom:2px solid var(--od-teal); padding-bottom:16px; }
.laudo-logo { font-size:23px; font-weight:800; letter-spacing:-.01em; }
.laudo-logo span { color:var(--od-teal-d); }
.laudo-vet { font-size:13px; font-weight:700; color:#26323f; margin-top:6px; }
.laudo-addr { font-size:11.5px; color:#6c7888; margin-top:3px; }
.laudo-pdata { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:22px 0 6px; }
.laudo-pdata > div { background:#f4f6f9; border-radius:8px; padding:8px 10px; }
.laudo-pdata span { display:block; font-size:9.5px; text-transform:uppercase; letter-spacing:.04em; color:#8a96a4; font-weight:700; }
.laudo-pdata b { display:block; font-size:13px; margin-top:2px; color:#26323f; }
.laudo-title { text-align:center; font-size:17px; font-weight:800; margin:18px 0 6px; color:var(--od-navy); }
.laudo-sec { margin-top:15px; }
.laudo-sec-t { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--od-teal-d); margin-bottom:5px; }
.laudo-sec-b { font-size:13px; line-height:1.55; white-space:pre-wrap; color:#26323f; border-bottom:1px dotted #dde3ea; padding-bottom:9px; min-height:20px; }
.laudo-sec-b.empty { color:#aeb8c4; }
.laudo-foot { margin-top:44px; display:flex; align-items:flex-end; justify-content:space-between; gap:24px; }
.laudo-date { font-size:12px; color:#6c7888; }
.laudo-sign { text-align:center; min-width:230px; }
.laudo-sign-line { border-top:1px solid #26323f; margin-bottom:6px; }
.laudo-sign-name { font-size:13px; font-weight:700; }
.laudo-sign-crmv { font-size:11.5px; color:#6c7888; }
@media (max-width:1080px){ .p5-grid { grid-template-columns:1fr; } .p5-right { position:static; } }

@media print {
  .od-header, .od-toolbar, .od-toolbar3, .od-bottom, .od-panel, .od-step-actions, .laudo-noprint { display:none !important; }
  .p5-pane > h2, .p5-pane > p, .p5-left { display:none !important; }
  .p5-grid { display:block !important; }
  .p5-right { position:static !important; }
  .p5-paper-scroll { background:none !important; padding:0 !important; max-height:none !important; overflow:visible !important; box-shadow:none !important; }
  .laudo-paper { box-shadow:none !important; max-width:100% !important; padding:0 !important; }
}

/* ===== Passo 6 — Cobrança e Notificações ===== */
.p6-pane { max-width:1080px; }
.p6-grid { display:grid; grid-template-columns:1fr 184px; gap:18px; align-items:start; }
.p6-main { display:flex; flex-direction:column; gap:14px; }
.p6-card { padding:18px 20px; }
.p6-card-label { font-size:15px; font-weight:800; color:var(--od-ink); }
.p6-card-label.strong { font-size:17px; }
.p6-card-sub { font-size:12.5px; color:var(--od-muted); margin:4px 0 14px; line-height:1.45; }
.p6-money { display:flex; align-items:center; gap:10px; }
.p6-cur { font-size:17px; font-weight:800; color:var(--od-muted); }
.p6-money input { flex:1; font-family:inherit; font-size:19px; font-weight:700; color:var(--od-ink); border:1px solid var(--od-line); border-radius:10px; padding:11px 14px; background:#fff; }
.p6-money input:focus { outline:none; border-color:var(--od-teal); box-shadow:0 0 0 3px rgba(0,201,167,.12); }
.p6-refresh { flex:none; width:44px; height:44px; border-radius:50%; border:none; background:var(--od-teal); color:#fff; display:grid; place-items:center; box-shadow:0 2px 8px rgba(0,201,167,.35); }
.p6-refresh:hover { background:var(--od-teal-d); }
.p6-total-card { border:1.5px solid var(--od-teal); }
.p6-total-val { font-size:32px; font-weight:800; color:var(--od-ink); letter-spacing:-.01em; display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
.p6-tax { font-size:12px; font-weight:600; color:var(--od-muted); }
.p6-paid-row { display:flex; align-items:center; gap:12px; margin-top:16px; padding-top:15px; border-top:1px solid var(--od-line); }
.p6-paid-check { width:24px; height:24px; border-radius:50%; border:2px solid #d4dbe3; color:transparent; display:grid; place-items:center; flex:none; transition:.15s; }
.p6-paid-check.on { background:var(--od-teal); border-color:var(--od-teal); color:#fff; }
.p6-paid-label { font-size:14px; font-weight:700; color:var(--od-ink); }
.p6-paid-code { flex:1; min-width:0; font-family:inherit; font-size:13.5px; border:1px solid var(--od-line); border-radius:9px; padding:9px 11px; background:#fff; }
.p6-paid-code:focus { outline:none; border-color:var(--od-teal); }
.p6-toggle { flex:none; width:52px; height:30px; border-radius:999px; border:none; background:#d4dbe3; position:relative; transition:background .18s; cursor:pointer; }
.p6-toggle.on { background:var(--od-teal); }
.p6-toggle-dot { position:absolute; top:3px; left:3px; width:24px; height:24px; border-radius:50%; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.25); transition:transform .18s; }
.p6-toggle.on .p6-toggle-dot { transform:translateX(22px); }
/* slider de retorno */
.p6-slider { -webkit-appearance:none; appearance:none; width:100%; height:6px; border-radius:999px; background:linear-gradient(to right, var(--od-teal) 0%, var(--od-teal) var(--fill,0%), #e2e7ee var(--fill,0%)); outline:none; margin:6px 0 2px; }
.p6-slider::-webkit-slider-thumb { -webkit-appearance:none; appearance:none; width:22px; height:22px; border-radius:50%; background:var(--od-teal); border:3px solid #fff; box-shadow:0 1px 5px rgba(0,201,167,.5); cursor:pointer; }
.p6-slider::-moz-range-thumb { width:22px; height:22px; border-radius:50%; background:var(--od-teal); border:3px solid #fff; box-shadow:0 1px 5px rgba(0,201,167,.5); cursor:pointer; }
.p6-slider-ticks { display:flex; justify-content:space-between; gap:2px; margin-top:8px; }
.p6-slider-ticks span { font-size:10px; font-weight:600; color:var(--od-faint); text-align:center; flex:1; line-height:1.2; }
.p6-slider-ticks span.on { color:var(--od-teal-d); font-weight:800; }
/* painel lateral */
.p6-side { display:flex; flex-direction:column; gap:10px; position:sticky; top:0; }
.p6-sbtn { width:100%; min-height:52px; border-radius:8px; font-family:inherit; font-size:13.5px; font-weight:700; display:flex; align-items:center; justify-content:center; gap:8px; padding:0 12px; text-align:center; line-height:1.2; cursor:pointer; border:1.5px solid transparent; }
.p6-sbtn.outline { background:#fff; border-color:var(--od-teal); color:var(--od-teal-d); }
.p6-sbtn.outline:hover { background:var(--od-teal-t); }
.p6-sbtn.navy { background:var(--od-navy); color:#fff; }
.p6-sbtn.navy:hover { filter:brightness(1.12); }
.p6-sbtn.send { background:#2bb673; color:#fff; }
.p6-sbtn.send:hover { background:#249a61; }
/* preview modal */
.p6-preview { background:#fff; border-radius:16px; padding:20px 22px; width:780px; max-width:96vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(16,40,61,.3); }
.p6-preview .od-card { box-shadow:none; border:1px solid var(--od-line); }
.p6-appt-row { display:flex; gap:12px; }
.p6-appt-f { flex:1; display:flex; flex-direction:column; gap:6px; }
.p6-appt-f span { font-size:12.5px; font-weight:700; color:var(--od-ink); }
.p6-appt-f input { font-family:inherit; font-size:14px; border:1px solid var(--od-line); border-radius:9px; padding:10px 12px; }
.p6-appt-f input:focus { outline:none; border-color:var(--od-teal); }
@media (max-width:920px){ .p6-grid { grid-template-columns:1fr; } .p6-side { position:static; flex-direction:row; flex-wrap:wrap; } .p6-sbtn { flex:1; min-width:140px; } }
@media (max-width:1180px){ .od-header-meta { display:none; } }
@media print { .od-header-actions, .od-stepper, .od-progress, .od-toolbar3, .od-panel, .od-bottom { display:none !important; } .od-main { grid-template-columns:1fr !important; } body { background:#fff; } }
.anat-num { font-size: 12px; font-weight: 700; fill: #44505c; font-family: 'Hanken Grotesk', sans-serif; }
.anat-qlabel { font-size: 17px; font-weight: 800; fill: #8a9099; font-family: 'Hanken Grotesk', sans-serif; }
.anat-svg g[style] { transition: none; }

/* ---------------- Carta: quadrantes + incisivos ---------------- */
.dvet-chart { display: flex; flex-direction: column; align-items: center; gap: 16px; }
.dvet-arch { display: flex; justify-content: center; align-items: flex-start; gap: 48px; width: 100%; }
.dvet-quad { display: flex; flex-direction: column; gap: 24px; }
.dvet-quad.q1, .dvet-quad.q4 { align-items: flex-end; }
.dvet-quad.q2, .dvet-quad.q3 { align-items: flex-start; }
.dvet-quad-tag { width: 100%; text-align: center; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); margin: 2px 0; }
.dvet-occ-row { display: flex; gap: 3px; align-items: flex-end; }
.dvet-lat-row { display: flex; gap: 3px; align-items: flex-start; background: rgba(29,95,107,.05); border: 1px solid rgba(29,95,107,.06); border-radius: 9px; padding: 5px 7px; }
.dvet-quad.q1 .dvet-lat-row { transform-origin: 100% 50%; transform: rotate(9deg); }
.dvet-quad.q2 .dvet-lat-row { transform-origin: 0% 50%; transform: rotate(-9deg); }
.dvet-quad.q4 .dvet-lat-row { transform-origin: 100% 50%; transform: rotate(-9deg); }
.dvet-quad.q3 .dvet-lat-row { transform-origin: 0% 50%; transform: rotate(9deg); }
.dvet-incisors { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 14px 6px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; }
.dvet-inc-svg { display: block; }
.dvet-inc-tag { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); margin-bottom: 4px; }
.dvet-inc-row { display: flex; gap: 4px; align-items: flex-end; }
.dvet-inc-row.bottom { align-items: flex-start; }
.dvet-inc-line { width: 78%; border-top: 1px dashed var(--line); margin: 2px 0; }
.dvet-inc-tooth { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; padding: 2px; border-radius: 6px; }
.dvet-inc-tooth:hover { background: rgba(29,95,107,.07); }
.dvet-inc-tooth.selected { background: var(--primary-t); box-shadow: inset 0 0 0 1.5px var(--primary); }
.dvet-inc-num { font-size: 9.5px; font-weight: 700; color: var(--muted); line-height: 1; }
.dvet-inc-body { position: relative; width: 23px; height: 33px; border-radius: 6px; }
.dvet-inc-tooth.marked .dvet-inc-body { background: color-mix(in srgb, var(--tint) 18%, transparent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--tint) 12%, transparent); }
.dvet-inc-chips { display: flex; gap: 2px; min-height: 11px; }

/* ---------------- Tooth ---------------- */
.eq-tooth { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; padding: 2px 1px; border-radius: 8px; }
.eq-tooth:hover { background: rgba(29,95,107,.07); }
.eq-tooth.selected { background: var(--primary-t); box-shadow: inset 0 0 0 1.5px var(--primary); }
.eq-tooth-num { font-size: 10px; font-weight: 700; color: var(--muted); line-height: 1; }
.eq-tooth.selected .eq-tooth-num { color: var(--primary-d); }
.toothbox { position: relative; display: block; border-radius: 9px; }
.eq-tooth.marked .toothbox { background: color-mix(in srgb, var(--tint) 16%, transparent); box-shadow: 0 0 0 4px color-mix(in srgb, var(--tint) 12%, transparent); }
.eq-tooth.t-molar .toothbox { width: 39px; height: 50px; }
.eq-tooth.t-premolar .toothbox { width: 36px; height: 50px; }
.eq-tooth.t-incisivo .toothbox { width: 30px; height: 40px; }
.eq-tooth.t-canino .toothbox { width: 24px; height: 48px; }
.eq-tooth.t-lobo .toothbox { width: 18px; height: 22px; }
.eq-chips { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 52px; }
.eq-chip {
  font-size: 8.5px; font-weight: 800; color: #fff; padding: 1px 3px; border-radius: 3px;
  letter-spacing: .02em; line-height: 1.35; white-space: nowrap;
}
.eq-chip.more { background: #9aa39e; }

/* ---------------- Dentes em perfil (lateral) ---------------- */
.eq-lat-tooth { display: flex; flex-direction: column; align-items: center; gap: 2px; background: none; border: none; padding: 2px; border-radius: 7px; }
.eq-lat-tooth:hover { background: rgba(29,95,107,.07); }
.eq-lat-tooth.selected { background: var(--primary-t); box-shadow: inset 0 0 0 1.5px var(--primary); }
.eq-lat-num { font-size: 9.5px; font-weight: 700; color: var(--muted); line-height: 1; }
.eq-lat-body { position: relative; width: 34px; height: 44px; border-radius: 7px; background: #fbf8f0; border: 1.6px solid #aab6b3; }
.eq-lat-tooth.t-canino .eq-lat-body { width: 26px; height: 50px; }
.eq-lat-tooth.t-lobo .eq-lat-body { width: 20px; height: 30px; }
.eq-lat-tooth.marked .eq-lat-body { background: color-mix(in srgb, var(--tint) 22%, #fbf8f0); border-color: var(--tint); }
.eq-lat-chips { display: flex; gap: 2px; min-height: 11px; }

/* ---------------- Drawing layer ---------------- */
.eq-draw-wrap { position: absolute; inset: 0; }
.eq-draw-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
.eq-drop { position: absolute; transform: translate(-50%, -88%); }

.eq-tool-hint {
  margin-top: 14px; font-size: 12.5px; color: var(--muted); font-weight: 500;
  background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
  padding: 8px 14px; max-width: 940px; width: 100%; text-align: center;
}

/* ---------------- Side panel ---------------- */
.eq-side-card { background: var(--panel-2); border: 1px solid var(--line); border-radius: 12px; padding: 14px; }
.eq-side-title { font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.eq-side-title.sm { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); margin: 14px 0 8px; }
.eq-side-sub { font-size: 12px; color: var(--muted); margin: 4px 0 12px; }
.eq-tooth-badge { background: var(--primary); color: #fff; font-size: 12px; font-weight: 800; padding: 2px 7px; border-radius: 6px; }
.eq-tooth-badge.sm { font-size: 11px; padding: 1px 6px; background: #41504c; }
.eq-empty { font-size: 12.5px; color: var(--muted); line-height: 1.5; margin: 6px 0; }
.eq-mark-list { display: flex; flex-direction: column; gap: 6px; }
.eq-mark-row { display: flex; align-items: center; gap: 8px; background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 6px 8px; }
.eq-dot { width: 11px; height: 11px; border-radius: 50%; flex: none; }
.eq-mark-name { flex: 1; font-size: 12.5px; font-weight: 600; }
.eq-x { border: none; background: none; color: var(--faint); font-size: 17px; line-height: 1; padding: 0 2px; }
.eq-x:hover { color: var(--danger); }
.eq-quickadd { display: flex; flex-wrap: wrap; gap: 5px; }
.eq-quickbtn { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; background: var(--panel); border: 1px solid var(--line); border-radius: 7px; padding: 4px 7px; }
.eq-quickbtn:hover { border-color: var(--primary); }
.eq-legend { display: flex; flex-direction: column; gap: 8px; }
.eq-legend-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink); line-height: 1.25; }
.eq-legend-row .eq-chip { flex: none; }
.eq-side-card .eq-btn.block { margin-top: 12px; }

/* ---------------- Step panes ---------------- */
.eq-scroll { flex: 1; min-height: 0; overflow-y: auto; }
.eq-step-pane { max-width: 980px; margin: 0 auto; padding: 26px 24px 60px; }
.eq-pane-head h2 { font-size: 22px; font-weight: 800; margin: 0 0 4px; letter-spacing: -.01em; }
.eq-pane-head p { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
.eq-form-card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; }
.eq-form-section { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); margin: 4px 0 12px; padding-top: 14px; border-top: 1px solid var(--line-2); }
.eq-form-section:first-child { padding-top: 0; border-top: none; }
.eq-form-row { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.eq-field { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 140px; }
.eq-field-label { font-size: 12px; font-weight: 600; color: var(--muted); }
.eq-input, .eq-textarea {
  font-family: inherit; font-size: 14px; color: var(--ink);
  border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; background: var(--panel); width: 100%;
}
.eq-input:focus, .eq-textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-t); }
.eq-textarea { resize: vertical; line-height: 1.5; }
