<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VetTooth Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root {
  --navy: #0e2c4d;
  --navy-2: #0a2440;
  --navy-3: #16395f;
  --teal: #14a8a0;
  --teal-d: #0f8f88;
  --teal-t: #e2f4f3;
  --bg: #eef1f5;
  --card: #ffffff;
  --ink: #15293d;
  --muted: #67788c;
  --faint: #97a4b3;
  --line: #e7ebf0;
  --line-2: #eef1f5;
  --green: #1fa971;
  --green-t: #e2f5ec;
  --amber: #e2912a;
  --amber-t: #fbefdc;
  --red: #e0533c;
  --red-t: #fbe7e3;
  --shadow: 0 1px 2px rgba(16,40,61,.04), 0 6px 20px rgba(16,40,61,.06);
  --radius: 16px;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: 'Hanken Grotesk', system-ui, sans-serif;
  background: var(--bg); color: var(--ink); font-size: 15px;
  -webkit-font-smoothing: antialiased; font-variant-numeric: tabular-nums;
}
#root { height: 100%; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
a { color: inherit; text-decoration: none; }

/* ---------------- App layout ---------------- */
.vt-app { display: flex; height: 100%; }
.vt-sidebar { width: 236px; flex: none; background: var(--navy); color: #cdd9e6; display: flex; flex-direction: column; }
.vt-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.vt-content { flex: 1; min-height: 0; overflow-y: auto; padding: 26px 30px 60px; }

/* ---------------- Logo ---------------- */
.vt-logo { display: flex; align-items: center; gap: 11px; padding: 20px 20px 18px; }
.vt-logo-mark { width: 38px; height: 38px; flex: none; }
.vt-logo-text { font-weight: 800; font-size: 18px; letter-spacing: .02em; color: #fff; line-height: 1; }
.vt-logo-text .pro { color: var(--teal); font-weight: 700; }

/* ---------------- Sidebar nav ---------------- */
.vt-nav { flex: 1; overflow-y: auto; padding: 6px 12px; display: flex; flex-direction: column; gap: 2px; }
.vt-nav-item {
  display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  padding: 10px 12px; border-radius: 10px; color: #aebccd; font-size: 14px; font-weight: 600;
  transition: background .14s, color .14s; position: relative;
}
.vt-nav-item:hover { background: rgba(255,255,255,.06); color: #fff; }
.vt-nav-item.active { background: var(--teal); color: #fff; box-shadow: 0 6px 16px rgba(20,168,160,.3); }
.vt-nav-item.active .vt-ic { color: #fff; }
.vt-nav-item .vt-ic { color: #7f93a8; flex: none; }
.vt-nav-foot { padding: 14px 18px; border-top: 1px solid rgba(255,255,255,.08); font-size: 11.5px; color: #6f8298; }

/* ---------------- Topbar ---------------- */
.vt-topbar { height: 66px; flex: none; background: var(--card); border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 18px; padding: 0 26px; }
.vt-search { flex: 1; max-width: 460px; position: relative; }
.vt-search input {
  width: 100%; font-family: inherit; font-size: 14px; color: var(--ink);
  background: var(--bg); border: 1px solid transparent; border-radius: 10px; padding: 10px 14px 10px 40px;
}
.vt-search input:focus { outline: none; background: #fff; border-color: var(--teal); }
.vt-search .vt-ic { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: var(--faint); }
.vt-topbar-spacer { flex: 1; }
.vt-topbar-actions { display: flex; align-items: center; gap: 18px; }
.vt-bell { position: relative; color: var(--muted); }
.vt-bell .dot { position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: var(--red); border-radius: 50%; border: 2px solid #fff; }
.vt-user { display: flex; align-items: center; gap: 10px; }
.vt-avatar { width: 34px; height: 34px; border-radius: 50%; background: var(--teal-t); color: var(--teal-d); display: grid; place-items: center; font-weight: 800; font-size: 13px; border: 1px solid var(--line); object-fit: cover; overflow: hidden; }
img.vt-avatar { display: block; }
.vt-user-name { font-size: 14px; font-weight: 700; }
.vt-chev { color: var(--faint); }

/* ---------------- Global search popup ---------------- */
.vt-search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; border-radius: 50%; color: var(--faint); font-size: 18px; line-height: 1; display: grid; place-items: center; }
.vt-search-clear:hover { background: var(--line); color: var(--ink); }
.vt-search-pop { position: absolute; top: calc(100% + 8px); left: 0; right: 0; background: #fff; border: 1px solid var(--line); border-radius: 13px; box-shadow: 0 18px 44px -16px rgba(16,40,61,.4); padding: 6px; z-index: 60; max-height: 70vh; overflow-y: auto; }
.vt-search-empty { padding: 18px 14px; font-size: 13.5px; color: var(--muted); text-align: center; }
.vt-search-group { padding: 4px 0; }
.vt-search-group + .vt-search-group { border-top: 1px solid var(--line-2); }
.vt-search-glabel { font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--faint); padding: 7px 10px 4px; }
.vt-search-item { display: flex; align-items: center; gap: 11px; width: 100%; text-align: left; padding: 8px 10px; border-radius: 9px; color: var(--ink); }
.vt-search-item.on { background: var(--teal-t); }
.vt-search-item .vt-search-ic { width: 30px; height: 30px; border-radius: 8px; display: grid; place-items: center; flex: none; }
.vt-search-ic.paciente { background: var(--teal-t); color: var(--teal-d); }
.vt-search-ic.responsavel { background: #e6edf5; color: #16395f; }
.vt-search-ic.atendimento { background: var(--amber-t); color: var(--amber); }
.vt-search-tx { flex: 1; min-width: 0; }
.vt-search-tx b { font-size: 13.5px; font-weight: 700; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vt-search-tx i { font-size: 12px; color: var(--muted); font-style: normal; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vt-search-item > .vt-ic { color: var(--faint); flex: none; }

/* ---------------- Page header ---------------- */
.vt-page-head { margin-bottom: 22px; }
.vt-page-head h1 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -.01em; }
.vt-page-head p { color: var(--muted); margin: 4px 0 0; font-size: 14px; }

/* ---------------- Cards ---------------- */
.vt-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
.vt-grid { display: grid; gap: 18px; }

/* KPI */
.vt-kpis { grid-template-columns: repeat(4, 1fr); }
.vt-kpi { padding: 16px 18px; display: flex; align-items: center; gap: 14px; }
.vt-kpi-ic { width: 48px; height: 48px; border-radius: 13px; background: var(--teal-t); color: var(--teal-d); display: grid; place-items: center; flex: none; }
.vt-kpi-label { font-size: 12.5px; color: var(--muted); font-weight: 600; white-space: nowrap; }
.vt-kpi-value { font-size: 22px; font-weight: 800; line-height: 1.1; margin: 2px 0; white-space: nowrap; }
.vt-kpi-delta { font-size: 12.5px; font-weight: 700; }
.vt-kpi-delta.up { color: var(--green); }
.vt-kpi-delta.down { color: var(--red); }
.vt-kpi { transition: transform .14s, box-shadow .14s, border-color .14s; }
.vt-kpi-btn { text-align: left; cursor: pointer; border: 1px solid transparent; }
.vt-kpi-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px -10px rgba(20,40,60,.35); border-color: var(--teal); }
.vt-kpis { grid-template-columns: repeat(4, 1fr); }
@media (min-width: 1280px) { .vt-kpis { grid-template-columns: repeat(4, 1fr); } }
/* animação de entrada dos cards */
@keyframes vtFadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
@media (prefers-reduced-motion: no-preference) {
  .vt-anim > * { animation: vtFadeUp .4s ease; }
}
/* badge no menu */
.vt-nav-item { position: relative; }
.vt-nav-badge { margin-left: auto; min-width: 19px; height: 19px; padding: 0 6px; border-radius: 999px; background: var(--teal); color: #fff; font-size: 11px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; }
.vt-nav-badge.red { background: var(--red); }
/* tooltip do gráfico */
.vt-chart-tip { position: absolute; top: 6px; transform: translateX(-50%); background: var(--navy, #16395f); color: #fff; border-radius: 9px; padding: 7px 11px; font-size: 11.5px; pointer-events: none; white-space: nowrap; box-shadow: 0 4px 14px -4px rgba(0,0,0,.4); z-index: 4; }
.vt-chart-tip b { display: block; font-size: 12px; margin-bottom: 3px; }
.vt-chart-tip span { display: flex; align-items: center; gap: 6px; }
.vt-chart-tip i { width: 8px; height: 8px; border-radius: 50%; }
/* atividade recente */
.vt-activity { display: flex; flex-direction: column; }
.vt-act-row { display: flex; align-items: center; gap: 12px; padding: 11px 4px; border-bottom: 1px solid var(--line-2); text-align: left; width: 100%; transition: background .12s; border-radius: 8px; }
.vt-act-row:last-child { border-bottom: none; }
.vt-act-row:hover { background: var(--teal-t); }
.vt-act-ic { width: 34px; height: 34px; border-radius: 9px; color: #fff; display: grid; place-items: center; flex: none; }
.vt-act-body { flex: 1; min-width: 0; }
.vt-act-body b { font-size: 14px; font-weight: 700; display: block; }
.vt-act-body i { font-size: 12.5px; color: var(--muted); font-style: normal; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vt-act-meta { font-size: 12px; color: var(--faint); text-align: right; white-space: nowrap; }
.vt-act-st { display: block; font-size: 10.5px; font-weight: 800; margin-top: 2px; font-style: normal; }
.vt-act-st.finalizado { color: var(--green); }
.vt-act-st.arquivado { color: var(--muted); }
/* pacientes — grid + filtros + histórico inline */
.vt-viewtoggle { display: inline-flex; background: var(--bg); border: 1px solid var(--line); border-radius: 9px; padding: 3px; gap: 2px; }
.vt-viewtoggle button { width: 34px; height: 30px; border-radius: 7px; color: var(--muted); display: grid; place-items: center; }
.vt-viewtoggle button.on { background: #fff; color: var(--teal-d); box-shadow: var(--shadow); }
.vt-pat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
.vt-pat-card { padding: 0; overflow: hidden; transition: transform .14s, box-shadow .14s; }
.vt-pat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 24px -12px rgba(20,40,60,.4); }
.vt-pat-card-main { display: flex; align-items: center; gap: 14px; padding: 16px; width: 100%; text-align: left; }
.vt-pat-emoji { position: relative; width: 54px; height: 54px; border-radius: 14px; background: var(--teal-t); display: grid; place-items: center; font-size: 24px; font-weight: 800; color: var(--ink); flex: none; }
.vt-pat-emoji-badge { position: absolute; right: -4px; bottom: -4px; width: 23px; height: 23px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(16,40,61,.2); display: grid; place-items: center; font-size: 14px; }
.vt-pat-info { min-width: 0; flex: 1; }
.vt-pat-info b { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
.vt-pat-info i { font-size: 13px; color: var(--muted); font-style: normal; display: block; margin-top: 2px; }
.vt-cli-code { display: inline-block; margin-top: 4px; font-size: 12px; font-weight: 800; letter-spacing: .04em; color: var(--teal-d); background: var(--teal-t, #e0f7f2); border: 1px solid color-mix(in srgb, var(--teal-d) 26%, transparent); padding: 2px 9px; border-radius: 999px; font-variant-numeric: tabular-nums; }
.vt-cli-code.inline { margin-top: 0; }
.vt-pat-sub { font-size: 12px; color: var(--faint); display: block; margin-top: 3px; }
.vt-pac-code { font-weight: 800; letter-spacing: .03em; color: var(--teal-d); }
.vt-pat-next { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 700; color: var(--teal-d); margin-top: 6px; }
.vt-pat-next.none { color: var(--faint); font-weight: 600; }
.vt-pat-foot { display: flex; align-items: center; justify-content: space-between; padding: 9px 16px; border-top: 1px solid var(--line-2); }
.vt-cli-card-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 14px; border-top: 1px solid var(--line-2); flex-wrap: wrap; }
.vt-cli-card-foot > .vt-tag { flex: none; }
.vt-cli-actions { display: flex; align-items: center; gap: 2px; margin-left: auto; }
.vt-cli-actions .vt-link { font-size: 12px; font-weight: 700; color: var(--teal-d); display: inline-flex; align-items: center; gap: 3px; padding: 4px 6px; border-radius: 7px; }
.vt-cli-actions .vt-link:hover { background: var(--teal-t, #e0f7f2); }
.vt-cli-actions .pr-del-btn { font-size: 13px; }
.vt-pat-exp { font-size: 12.5px; font-weight: 700; color: var(--teal-d); display: inline-flex; align-items: center; gap: 4px; }
.vt-pat-hist { padding: 4px 16px 14px; }
.vt-pat-hist-row { display: flex; align-items: flex-start; gap: 9px; padding: 7px 0; border-top: 1px solid var(--line-2); }
.vt-pat-hist-row .dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex: none; }
.vt-pat-hist-row b { font-size: 13px; font-weight: 700; display: block; }
.vt-pat-hist-row i { font-size: 12px; color: var(--muted); font-style: normal; }
.vt-kpi-delta span { color: var(--faint); font-weight: 500; }

/* Section card */
.vt-sec { padding: 20px 22px; }
.vt-sec-title { font-size: 17px; font-weight: 800; margin: 0 0 14px; }
.vt-list-row { display: flex; align-items: baseline; gap: 8px; padding: 11px 0; border-bottom: 1px solid var(--line-2); font-size: 14.5px; }
.vt-list-row:last-child { border-bottom: none; }
.vt-list-row .name { font-weight: 700; }
.vt-list-row .meta { color: var(--muted); flex: 1; }
.vt-list-row .time { font-weight: 700; color: var(--ink); }
.vt-alert-row { display: flex; gap: 10px; padding: 11px 0; border-bottom: 1px solid var(--line-2); font-size: 14px; }
.vt-alert-row:last-child { border-bottom: none; }
.vt-alert-row .k { font-weight: 800; }
.vt-alert-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; margin-top: 6px; }

/* Quick actions */
.vt-qa-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.vt-qa {
  display: flex; align-items: center; gap: 11px; padding: 15px 16px; border-radius: 12px;
  font-weight: 700; font-size: 14px; color: #fff; transition: transform .12s, filter .12s; white-space: nowrap;
}
.vt-qa:hover { filter: brightness(1.06); transform: translateY(-1px); }
.vt-qa.navy { background: var(--navy); }
.vt-qa.teal { background: var(--teal); }
.vt-qa .vt-ic { flex: none; }

/* Chart */
.vt-chart-legend { display: flex; gap: 16px; font-size: 12.5px; color: var(--muted); margin-bottom: 6px; }
.vt-chart-legend span { display: inline-flex; align-items: center; gap: 6px; }
.vt-chart-legend i { width: 16px; height: 3px; border-radius: 2px; display: inline-block; }

/* Odontograma frame */
.vt-frame-wrap { position: absolute; inset: 0; }
.vt-frame { width: 100%; height: 100%; border: none; display: block; }
.vt-content.flush { padding: 0; position: relative; }

/* ============ Odontograma (módulo OdontogramaModule) ============ */
.odm { display: flex; flex-direction: column; gap: 16px; }
.odm-top { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; flex-wrap: wrap; }
.odm-patient { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
.odm-patient-meta { display: flex; align-items: center; gap: 11px; padding-bottom: 2px; }
.odm-pet-ava { width: 40px; height: 40px; border-radius: 11px; background: var(--teal-t); display: grid; place-items: center; font-size: 21px; flex: none; }
.odm-patient-meta b { font-size: 15px; font-weight: 800; display: block; line-height: 1.2; }
.odm-patient-meta i { font-size: 12.5px; color: var(--muted); font-style: normal; }
.odm-species { display: flex; gap: 10px; }
.odm-sp { display: flex; flex-direction: column; align-items: center; gap: 1px; width: 104px; padding: 11px 8px; border-radius: 14px; border: 1.5px solid var(--line); background: #fff; transition: transform .12s, border-color .12s, box-shadow .12s; }
.odm-sp:hover { border-color: #cdd6df; transform: translateY(-2px); }
.odm-sp.on { border-color: var(--teal); background: var(--teal-t); box-shadow: 0 8px 18px -10px rgba(20,168,160,.6); }
.odm-sp-emoji { font-size: 26px; line-height: 1.1; }
.odm-sp-l { font-size: 14px; font-weight: 800; color: var(--ink); }
.odm-sp.on .odm-sp-l { color: var(--teal-d); }
.odm-sp-n { font-size: 11px; font-weight: 600; color: var(--faint); }

.odm-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.odm-sum { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 15px 18px; display: flex; align-items: center; gap: 13px; }
.odm-sum-ic { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; flex: none; }
.odm-sum-ic.teal { background: var(--teal-t); color: var(--teal-d); }
.odm-sum-ic.red { background: var(--red-t); color: var(--red); }
.odm-sum-ic.green { background: var(--green-t); color: var(--green); }
.odm-sum-l { font-size: 12.5px; color: var(--muted); font-weight: 600; display: block; }
.odm-sum-v { font-size: 24px; font-weight: 800; line-height: 1.1; }
.odm-sum-v i { font-size: 14px; font-weight: 600; color: var(--faint); font-style: normal; margin-left: 3px; }

.odm-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 14px; flex-wrap: wrap; background: var(--card); border: 1px solid var(--line); border-radius: 14px; box-shadow: var(--shadow); padding: 10px 12px; }
.odm-tb-left, .odm-tb-right { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.odm-tb-btn { display: inline-flex; align-items: center; gap: 7px; font-weight: 700; font-size: 13px; padding: 9px 13px; border-radius: 10px; border: 1px solid var(--line); background: #fff; color: var(--ink); white-space: nowrap; }
.odm-tb-btn:hover { border-color: var(--teal); color: var(--teal-d); background: var(--teal-t); }
.odm-tb-btn.primary { background: var(--teal); color: #fff; border-color: var(--teal); }
.odm-tb-btn.primary:hover { filter: brightness(1.06); color: #fff; }
.odm-tb-btn.ghost { border-color: transparent; color: var(--muted); }
.odm-tb-btn.ghost:hover { background: var(--bg); color: var(--ink); }
.odm-tb-count { min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px; background: var(--bg); color: var(--muted); font-size: 11px; font-weight: 800; display: inline-grid; place-items: center; }
.odm-tools { display: flex; gap: 3px; background: #2b2f36; border-radius: 11px; padding: 4px; }
.odm-tool { width: 38px; height: 38px; border-radius: 8px; display: grid; place-items: center; color: #cdd6df; }
.odm-tool:hover { background: rgba(255,255,255,.12); color: #fff; }
.odm-tool.on { background: var(--teal); color: #fff; }
.odm-tool-ic { font-size: 18px; line-height: 1; }
.odm-swatches { display: flex; gap: 6px; }
.odm-swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 0 1px var(--line); }
.odm-swatch.on { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--ink); }

.odm-body { display: grid; grid-template-columns: 1fr 326px; gap: 18px; align-items: start; }
@media (max-width: 1080px) { .odm-body { grid-template-columns: 1fr; } .odm-summary { grid-template-columns: 1fr; } }
.odm-chart-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px 16px; }
.odm-chart-labels { display: flex; justify-content: space-between; font-size: 11.5px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.odm-chart-labels span:nth-child(2) { color: var(--muted); }
.odm-chart-stage { position: relative; width: 100%; }
.odm-svg { display: block; width: 100%; height: auto; }
.odm-draw { position: absolute; inset: 0; width: 100%; height: 100%; }
.odm-tnum-svg { font-family: 'Hanken Grotesk', sans-serif; font-size: 11px; font-weight: 800; }
.odm-tcode { font-family: 'Hanken Grotesk', sans-serif; font-size: 10px; font-weight: 800; }
.odm-tcheck { font-family: 'Hanken Grotesk', sans-serif; font-size: 7.5px; font-weight: 800; fill: #fff; pointer-events: none; }
.odm-quad { font-family: 'Hanken Grotesk', sans-serif; font-size: 11px; font-weight: 700; fill: var(--faint); }
.odm-tooth { transition: opacity .1s; }
.odm-tooth:hover rect:not([stroke='#16395f']) { filter: brightness(.97); }
.odm-legend { display: flex; flex-wrap: wrap; gap: 9px 18px; justify-content: center; margin-top: 12px; padding-top: 14px; border-top: 1px solid var(--line); }
.odm-legend-item { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; font-weight: 600; color: var(--ink); }
.odm-legend-dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
.odm-legend-dot.ring { background: #fff; border: 1.5px solid #d7dde3; }

/* painel do dente */
.odm-panel { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; position: sticky; top: 0; }
.odm-panel-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.odm-panel-tooth { display: flex; align-items: center; gap: 11px; }
.odm-tnum { width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px; flex: none; }
.odm-panel-tooth b { font-size: 16px; font-weight: 800; display: block; line-height: 1.2; }
.odm-panel-tooth i { font-size: 12px; color: var(--muted); font-style: normal; }
.odm-panel-x { font-size: 24px; line-height: 1; color: var(--faint); padding: 0 2px; }
.odm-panel-x:hover { color: var(--ink); }
.odm-field-label { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); margin: 17px 0 9px; }
.odm-cond-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.odm-cond { display: flex; align-items: center; gap: 7px; padding: 9px 10px; border: 1px solid var(--line); border-radius: 10px; background: #fff; font-size: 12.5px; font-weight: 600; color: var(--ink); text-align: left; position: relative; }
.odm-cond:hover { border-color: #cdd6df; background: var(--bg); }
.odm-cond.on { border-color: var(--cc); box-shadow: inset 0 0 0 1px var(--cc); background: #fff; }
.odm-cond-dot { width: 12px; height: 12px; border-radius: 50%; flex: none; }
.odm-cond-l { flex: 1; line-height: 1.15; }
.odm-cond-badge { font-size: 9.5px; font-weight: 800; color: #fff; padding: 1px 5px; border-radius: 5px; flex: none; }
.odm-sev { display: flex; align-items: center; gap: 4px; }
.odm-star { font-size: 26px; line-height: 1; color: #d7dde3; }
.odm-star:hover, .odm-star.on { color: #f6b73c; }
.odm-sev-l { margin-left: 10px; font-size: 13px; font-weight: 700; color: var(--muted); }
.odm-note { width: 100%; font-family: inherit; font-size: 13.5px; border: 1px solid var(--line); border-radius: 10px; padding: 10px 11px; resize: vertical; min-height: 64px; box-sizing: border-box; }
.odm-note:focus { outline: none; border-color: var(--teal); }
.odm-treated { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-top: 16px; padding: 12px 14px; border-radius: 12px; background: var(--bg); border: 1px solid var(--line); font-size: 14px; font-weight: 700; color: var(--muted); }
.odm-treated.on { background: var(--green-t); border-color: #bfe6d2; color: var(--green); }
.odm-treated-l { display: inline-flex; align-items: center; gap: 8px; }
.odm-switch { width: 44px; height: 25px; border-radius: 999px; background: #cfd6dd; position: relative; transition: background .15s; flex: none; }
.odm-treated.on .odm-switch { background: var(--green); }
.odm-switch i { position: absolute; top: 3px; left: 3px; width: 19px; height: 19px; border-radius: 50%; background: #fff; transition: left .15s; }
.odm-treated.on .odm-switch i { left: 22px; }
.odm-clear-tooth { display: block; width: 100%; margin-top: 12px; padding: 8px; font-size: 12.5px; font-weight: 700; color: var(--red); border-radius: 9px; }
.odm-clear-tooth:hover { background: var(--red-t); }
.odm-panel-empty { text-align: center; padding: 36px 12px; }
.odm-panel-empty-ic { width: 56px; height: 56px; border-radius: 15px; background: var(--bg); color: var(--faint); display: grid; place-items: center; margin: 0 auto 14px; }
.odm-panel-empty b { display: block; font-size: 15px; font-weight: 800; }
.odm-panel-empty p { font-size: 13px; color: var(--muted); margin-top: 7px; line-height: 1.5; }

/* histórico */
.odm-hist-modal { width: min(640px, 96vw); padding: 0; }
.odm-hist-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--line); }
.odm-hist-head h3 { margin: 0; font-size: 18px; font-weight: 800; }
.odm-hist-empty { padding: 30px 22px; color: var(--muted); font-size: 14px; line-height: 1.6; }
.odm-hist-list { max-height: 62vh; overflow-y: auto; padding: 8px 14px 16px; }
.odm-hist-row { display: flex; align-items: center; gap: 14px; padding: 14px 10px; border-bottom: 1px solid var(--line-2); }
.odm-hist-row:last-child { border-bottom: none; }
.odm-hist-main { flex: 1; min-width: 0; }
.odm-hist-top { display: flex; align-items: center; gap: 9px; }
.odm-hist-top b { font-size: 14.5px; font-weight: 800; }
.odm-hist-sp { font-size: 11px; font-weight: 700; color: var(--teal-d); background: var(--teal-t); padding: 2px 8px; border-radius: 999px; }
.odm-hist-top i { font-size: 12px; color: var(--muted); font-style: normal; margin-left: auto; }
.odm-hist-sum { font-size: 13px; color: var(--muted); margin-top: 4px; }
.odm-hist-stats { display: flex; flex-direction: column; gap: 2px; font-size: 11.5px; color: var(--muted); text-align: right; flex: none; }
.odm-hist-stats b { color: var(--ink); }
.odm-hist-stats .red b { color: var(--red); }
.odm-hist-stats .green b { color: var(--green); }
.odm-hist-load { font-size: 12.5px; font-weight: 700; padding: 8px 13px; border-radius: 9px; border: 1px solid var(--line); background: #fff; color: var(--teal-d); flex: none; }
.odm-hist-load:hover { background: var(--teal-t); border-color: var(--teal); }

/* Placeholder */
.vt-placeholder { display: grid; place-items: center; min-height: 60vh; }
.vt-placeholder-card { text-align: center; max-width: 440px; padding: 40px; }
.vt-placeholder-ic { width: 64px; height: 64px; border-radius: 18px; background: var(--teal-t); color: var(--teal-d); display: grid; place-items: center; margin: 0 auto 18px; }
.vt-placeholder h2 { font-size: 20px; font-weight: 800; margin: 0 0 6px; }
.vt-placeholder p { color: var(--muted); font-size: 14px; line-height: 1.5; margin: 0; }
.vt-badge-soon { display: inline-block; margin-top: 16px; font-size: 12px; font-weight: 700; color: var(--teal-d); background: var(--teal-t); padding: 5px 12px; border-radius: 999px; }

@media (max-width: 1080px) {
  .vt-kpis { grid-template-columns: repeat(2, 1fr); }
  .vt-sidebar { width: 76px; }
  .vt-logo-text, .vt-nav-item span:not(.vt-ic), .vt-nav-foot { display: none; }
  .vt-nav-item { justify-content: center; }
}

/* ============ Botões ============ */
.vt-btn-primary { display: inline-flex; align-items: center; gap: 8px; background: var(--teal); color: #fff; font-weight: 700; font-size: 14px; padding: 10px 16px; border-radius: 10px; transition: filter .12s, transform .12s; white-space: nowrap; line-height: 1; }
.vt-btn-primary:hover { filter: brightness(1.06); transform: translateY(-1px); }
.vt-btn-ghost { display: inline-flex; align-items: center; gap: 8px; background: #fff; border: 1px solid var(--line); color: var(--ink); font-weight: 600; font-size: 14px; padding: 10px 16px; border-radius: 10px; white-space: nowrap; line-height: 1; }
.vt-btn-ghost:hover { background: var(--bg); }
.vt-link { background: none; color: var(--teal-d); font-weight: 700; font-size: 13px; margin-left: auto; }
.vt-head-row { display: flex; justify-content: space-between; align-items: flex-end; }
.vt-head-actions { display: flex; align-items: center; gap: 12px; }
.vt-muted { color: var(--muted); }

/* ============ Toolbar / busca / segmented ============ */
.vt-toolbar-row { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
.vt-search.inline { position: relative; flex: 1; max-width: 420px; display: flex; align-items: center; }
.vt-search.inline .vt-ic { position: absolute; left: 12px; color: var(--faint); }
.vt-search.inline input { width: 100%; font-family: inherit; font-size: 14px; background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px 10px 38px; }
.vt-search.inline input:focus { outline: none; border-color: var(--teal); }
.vt-segmented { display: inline-flex; background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 2px; }
.vt-segmented button { padding: 7px 14px; border-radius: 8px; font-weight: 600; font-size: 13.5px; color: var(--muted); }
.vt-segmented button.active { background: var(--teal); color: #fff; }
.vt-segmented.wide button { padding: 9px 20px; }

/* ============ Tabela ============ */
.vt-table-card { padding: 6px 6px; overflow: hidden; }
.vt-table { display: flex; flex-direction: column; }
.vt-tr { display: grid; grid-template-columns: 1.6fr 1fr 1.2fr 1.4fr 1fr .8fr; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--line-2); font-size: 14px; text-align: left; }
.vt-table.cols-5 .vt-tr { grid-template-columns: 1.6fr 1.3fr 1.2fr 1.2fr .8fr; }
.vt-table.cols-6 .vt-tr { grid-template-columns: 1.8fr 1fr 1fr 1.2fr 1fr .8fr; }
.vt-table.cols-3 .vt-tr { grid-template-columns: 1.6fr 1.4fr 1fr; }
.vt-tr:last-child { border-bottom: none; }
.vt-th { font-size: 11.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); }
.vt-row-btn { background: none; width: 100%; cursor: pointer; }
.vt-row-btn:hover { background: var(--bg); border-radius: 10px; }
.vt-tr.low { background: #fdf4f2; }
.vt-cell-name { display: flex; align-items: center; gap: 11px; }
.vt-cell-name b { font-weight: 700; }
.vt-id { display: block; font-size: 11.5px; color: var(--faint); font-style: normal; font-weight: 600; }
.vt-pet-avatar { width: 36px; height: 36px; border-radius: 10px; display: grid; place-items: center; color: #fff; font-weight: 800; font-size: 15px; flex: none; }
.vt-pet-avatar.lg { width: 64px; height: 64px; border-radius: 16px; font-size: 26px; }
.vt-sp-tag { font-size: 12.5px; font-weight: 700; color: var(--navy); background: #eaf0f6; padding: 3px 10px; border-radius: 999px; }
.vt-pill { font-size: 12px; font-weight: 700; padding: 3px 11px; border-radius: 999px; }
.vt-tag { font-size: 12px; font-weight: 700; color: var(--muted); background: var(--bg); padding: 3px 9px; border-radius: 7px; }
.vt-tag.teal { color: var(--teal-d); background: var(--teal-t); }
.vt-tag.red { color: var(--red); background: var(--red-t); }
.vt-tag.amber { color: var(--amber); background: var(--amber-t); }
.vt-chip-row { display: inline-flex; flex-wrap: wrap; gap: 6px; }
.vt-empty-row { padding: 30px; text-align: center; color: var(--muted); }

/* ============ Perfil paciente ============ */
.vt-back { display: inline-flex; align-items: center; gap: 4px; color: var(--muted); font-weight: 700; font-size: 13.5px; margin-bottom: 14px; }
.vt-back .vt-ic { transform: rotate(90deg); }
.vt-back:hover { color: var(--teal-d); }
.vt-profile-head { display: flex; align-items: center; gap: 18px; margin-bottom: 18px; }
.vt-profile-id { flex: 1; }
.vt-profile-name { font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 12px; }
.vt-profile-meta { color: var(--muted); font-size: 14px; margin-top: 3px; }
.vt-profile-owner { font-size: 13.5px; margin-top: 6px; }
.vt-profile-actions { display: flex; gap: 10px; }
.vt-obito-banner { background: #eef1f5; border: 1px solid #dde3ea; color: var(--muted); padding: 12px 16px; border-radius: 12px; font-size: 13.5px; margin-bottom: 18px; }
.vt-info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.vt-info-tile { background: var(--bg); border-radius: 10px; padding: 11px 13px; }
.vt-info-label { display: block; font-size: 11.5px; color: var(--muted); font-weight: 600; }
.vt-info-value { display: block; font-size: 14.5px; font-weight: 700; margin-top: 3px; }
.vt-clin-rows { display: flex; flex-direction: column; gap: 10px; }
.vt-clin-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--line-2); font-size: 13.5px; }
.vt-clin-row:last-child { border-bottom: none; }
.vt-clin-row > span:first-child { color: var(--muted); font-weight: 600; }
.vt-stack { display: flex; flex-direction: column; gap: 18px; }
.vt-asa { display: flex; align-items: center; gap: 14px; }
.vt-asa-badge { font-size: 18px; font-weight: 800; padding: 10px 16px; border-radius: 12px; color: #fff; background: var(--green); white-space: nowrap; line-height: 1; }
.vt-asa-badge.risk-Moderado { background: var(--amber); }
.vt-asa-badge.risk-Alto { background: var(--red); }
.vt-asa-label { font-size: 12px; color: var(--muted); font-weight: 600; }
.vt-asa-risk { font-size: 15px; font-weight: 700; }
.vt-ai-note { font-size: 13px; color: var(--muted); line-height: 1.55; margin: 0; display: flex; gap: 8px; }
.vt-ai-note .vt-ic { color: var(--teal); flex: none; margin-top: 2px; }

/* ============ Formulário ============ */
.vt-form { max-width: none; }
.vt-form-sec { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--faint); margin: 8px 0 14px; padding-top: 16px; border-top: 1px solid var(--line-2); }
.vt-form-sec:first-child { padding-top: 0; border-top: none; }
.vt-cep-msg { text-transform: none; letter-spacing: 0; color: var(--teal-d); font-weight: 600; margin-left: 8px; }
.vt-form-row { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.vt-form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line-2); }
.vtf { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 130px; }
.vtf-label { font-size: 12.5px; font-weight: 600; color: var(--muted); }
.vtf-req { color: var(--red); font-style: normal; margin-left: 2px; }
.vtf-inputwrap { position: relative; display: flex; align-items: center; }
.vtf-input { width: 100%; font-family: inherit; font-size: 14px; color: var(--ink); background: #fff; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; }
.vtf-input:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-t); }
.vtf-input.valid { border-color: var(--green); }
.vtf-input.invalid { border-color: var(--red); }
select.vtf-input { appearance: none; cursor: pointer; }
.vtf-check { position: absolute; right: 11px; font-weight: 800; font-size: 13px; }
.vtf-check.ok { color: var(--green); }
.vtf-check.bad { color: var(--red); }
.vtf-suffix { position: absolute; right: 12px; color: var(--muted); font-size: 13px; }
.vtf-hint { font-size: 11.5px; color: var(--teal-d); font-weight: 600; }
.vtf-err { font-size: 11.5px; color: var(--red); font-weight: 600; }
.vtf-suggest { position: absolute; top: 100%; left: 0; right: 0; margin-top: 4px; background: #fff; border: 1px solid var(--line); border-radius: 10px; box-shadow: var(--shadow); z-index: 20; overflow: hidden; display: flex; flex-direction: column; }
.vtf-suggest-item { text-align: left; padding: 9px 12px; font-size: 13.5px; }
.vtf-suggest-item:hover { background: var(--teal-t); }
.vtf-suggest-item.owner-item { display: flex; flex-direction: column; gap: 2px; align-items: flex-start; padding: 10px 12px; }
.vtf-suggest-item.owner-item b { font-size: 13.5px; font-weight: 700; }
.vtf-suggest-item.owner-item i { font-size: 11.5px; color: var(--muted); font-style: normal; }
.vtf-whats { display: grid; place-items: center; width: 34px; height: 34px; margin-left: 6px; border-radius: 9px; background: #25d366; color: #fff; flex: none; }
.vtf-whats.disabled { background: #cfd6dd; pointer-events: none; }

/* ============ Agenda ============ */
.vt-sync { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; color: var(--muted); background: #fff; border: 1px solid var(--line); padding: 8px 12px; border-radius: 9px; }
.vt-sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
.vt-cal { padding: 0; overflow: hidden; }

/* ===== Agenda calendário (datas) ===== */
.ag-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.ag-layout { display: grid; grid-template-columns: 248px 1fr 296px; gap: 16px; align-items: start; }
@media (max-width: 1300px) { .ag-layout { grid-template-columns: 220px 1fr; } .ag-detail { grid-column: 1 / -1; } }
@media (max-width: 900px) { .ag-layout { grid-template-columns: 1fr; } }
.ag-side { display: flex; flex-direction: column; gap: 14px; }
.ag-center { min-width: 0; }
.ag-period { display: flex; align-items: center; gap: 6px; margin-left: auto; }
.ag-new { white-space: nowrap; }
/* mini-calendário */
.ag-mini { padding: 14px; }
.ag-mini-head { display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 14px; margin-bottom: 10px; }
.ag-navbtn.sm { width: 26px; height: 26px; font-size: 15px; }
.ag-mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.ag-mini-dow { text-align: center; font-size: 10px; font-weight: 700; color: var(--faint); padding: 3px 0; }
.ag-mini-day { position: relative; aspect-ratio: 1; border-radius: 50%; font-size: 12px; font-weight: 600; color: var(--ink); display: grid; place-items: center; }
.ag-mini-day:hover { background: var(--teal-t); }
.ag-mini-day.out { color: var(--faint); opacity: .5; }
.ag-mini-day.today { background: var(--teal-t); color: var(--teal-d); font-weight: 800; }
.ag-mini-day.sel { background: var(--teal); color: #fff; font-weight: 800; }
.ag-mini-ev { position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: var(--teal); }
.ag-mini-day.sel .ag-mini-ev { background: #fff; }
/* filtros */
.ag-filters { padding: 16px; }
.ag-filters-title { font-size: 16px; font-weight: 800; margin: 0 0 12px; }
.ag-fgroup { margin-bottom: 14px; }
.ag-fhead { display: block; font-size: 13px; font-weight: 700; color: var(--ink); margin-bottom: 7px; }
.ag-fcheck { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; color: var(--muted); cursor: pointer; }
.ag-fcheck input { width: 15px; height: 15px; accent-color: var(--teal); }
.ag-fdot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
.ag-navbtn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--line); background: #fff; font-size: 18px; font-weight: 700; color: var(--ink); }
.ag-navbtn:hover { border-color: var(--teal); color: var(--teal-d); }
.ag-today { height: 34px; padding: 0 16px; border-radius: 8px; border: 1px solid var(--line); background: #fff; font-weight: 700; font-size: 13px; }
.ag-today:hover { border-color: var(--teal); color: var(--teal-d); }
.ag-title { font-weight: 800; font-size: 15px; }
.ag-viewseg { display: inline-flex; background: var(--bg); border-radius: 9px; padding: 3px; gap: 2px; }
.ag-viewseg button { padding: 8px 16px; border-radius: 7px; font-weight: 700; font-size: 13px; color: var(--muted); }
.ag-viewseg button.on { background: var(--teal); color: #fff; }
.ag-viewseg .ag-today { border: none; background: transparent; padding: 8px 14px; }
.ag-cal { padding: 0; overflow: hidden; }
.ag-grid { display: grid; max-height: 72vh; overflow-y: auto; }
.ag-corner { position: sticky; top: 0; z-index: 3; background: var(--card); border-bottom: 1px solid var(--line); }
.ag-dayhead { position: sticky; top: 0; z-index: 3; background: var(--card); padding: 9px 6px; text-align: center; border-bottom: 1px solid var(--line); border-left: 1px solid var(--line-2); }
.ag-dayhead.today { background: var(--teal-t); }
.ag-dow { display: block; font-size: 11px; font-weight: 700; color: var(--faint); }
.ag-dnum { display: none; }
.ag-hour { font-size: 11px; color: var(--faint); font-weight: 600; text-align: right; padding: 4px 8px 0 0; border-bottom: 1px solid var(--line-2); height: 46px; }
.ag-cell { border-left: 1px solid var(--line-2); border-bottom: 1px solid var(--line-2); height: 46px; position: relative; cursor: pointer; }
.ag-cell:hover { background: var(--teal-t); }
.ag-ev { position: absolute; left: 2px; right: 2px; top: 2px; border-left: 4px solid; border-radius: 5px; padding: 4px 7px; overflow: hidden; z-index: 2; cursor: pointer; }
.ag-ev.sel { box-shadow: 0 0 0 2px var(--ink); }
.ag-ev-grp { font-size: 10px; font-weight: 800; display: block; line-height: 1.2; }
.ag-ev-p { font-size: 11.5px; font-weight: 700; display: block; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ag-ev-k { font-size: 10.5px; color: var(--muted); display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
/* eventos do Google Calendar (sobrepostos) */
.ag-ev-gcal { background: #e6eeff; border-left-color: #4285f4 !important; border-style: dashed; cursor: default; }
.ag-gcal-badge { color: #4285f4 !important; }
.ag-btn-ghost.connected, .vt-btn-ghost.ag-gcal.connected { background: #e3f6ec; border-color: #1fa971; color: #167c52; }
.ag-gcal-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.vt-btn-ghost.ag-gcal { max-width: 230px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* painel Rota do Dia */
.ag-route-overlay { position: fixed; inset: 0; background: rgba(15,30,45,.42); z-index: 120; display: flex; justify-content: flex-end; }
.ag-route-panel { width: 380px; max-width: 92vw; background: #fff; height: 100%; display: flex; flex-direction: column; box-shadow: -8px 0 32px rgba(16,40,61,.22); animation: agRouteIn .22s ease; }
@keyframes agRouteIn { from { transform: translateX(40px); opacity: .4; } to { transform: none; opacity: 1; } }
.ag-route-head { background: var(--navy, #1a2e44); color: #fff; padding: 18px 20px; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.ag-route-head h3 { margin: 0; font-size: 17px; font-weight: 800; }
.ag-route-head span { font-size: 12.5px; opacity: .8; }
.ag-route-x { background: rgba(255,255,255,.14); border: none; color: #fff; width: 30px; height: 30px; border-radius: 8px; font-size: 18px; line-height: 1; flex: none; }
.ag-route-x:hover { background: rgba(255,255,255,.26); }
.ag-route-body { flex: 1; overflow-y: auto; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
.ag-route-empty { font-size: 13.5px; color: var(--muted); text-align: center; padding: 30px 10px; }
.ag-route-card { display: flex; align-items: flex-start; gap: 12px; border: 1px solid var(--line); border-radius: 12px; padding: 12px 13px; }
.ag-route-time { font-size: 15px; font-weight: 800; color: var(--teal-d); flex: none; min-width: 46px; }
.ag-route-info { flex: 1; min-width: 0; }
.ag-route-info b { font-size: 14px; font-weight: 800; display: block; }
.ag-route-sp { font-weight: 600; color: var(--muted); }
.ag-route-info i { font-size: 12px; color: var(--muted); font-style: normal; display: block; margin-top: 1px; }
.ag-route-addr { font-size: 12px; color: var(--ink); display: block; margin-top: 5px; line-height: 1.4; }
.ag-route-addr.none { color: var(--faint); font-style: italic; }
.ag-route-maps { flex: none; display: inline-flex; align-items: center; gap: 4px; background: var(--teal-t, #e0f7f2); color: var(--teal-d); border: none; border-radius: 8px; padding: 7px 10px; font-size: 12px; font-weight: 700; align-self: center; }
.ag-route-maps:hover { background: #c9efe9; }
.ag-route-foot { padding: 14px 16px; border-top: 1px solid var(--line); }
.ag-route-hint { font-size: 12.5px; color: var(--muted); margin: 0; text-align: center; line-height: 1.45; }
/* painel de detalhes */
.ag-detail-card { padding: 18px; position: sticky; top: 0; }
.ag-detail-top { display: flex; align-items: center; justify-content: space-between; }
.ag-detail-title { font-size: 16px; font-weight: 800; margin: 0 0 10px; line-height: 1.25; }
.ag-detail-x { color: var(--faint); font-size: 15px; }
.ag-detail-empty { font-size: 13px; color: var(--muted); line-height: 1.5; }
.ag-drow { display: flex; gap: 11px; padding: 9px 0; border-bottom: 1px solid var(--line-2); }
.ag-dic { color: var(--teal-d); flex: none; margin-top: 1px; }
.ag-drow i { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--faint); font-style: normal; }
.ag-drow b { display: block; font-size: 13.5px; font-weight: 600; color: var(--ink); margin-top: 2px; line-height: 1.35; }
.ag-detail-actions { display: flex; flex-direction: column; gap: 9px; margin-top: 16px; }
.ag-detail-actions button { width: 100%; justify-content: center; }
.ag-msg-btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--teal); color: #fff; font-weight: 700; font-size: 13.5px; padding: 11px 8px; border-radius: 10px; line-height: 1.2; }
.ag-msg-btn:hover { filter: brightness(1.06); }

/* ===== Ficha do paciente (perfil) ===== */
.pf-crumb { font-size: 13px; color: var(--muted); margin-bottom: 14px; }
.pf-crumb button { color: var(--teal-d); font-weight: 700; }
.pf-crumb span { margin: 0 6px; color: var(--faint); }
.pf-grid { display: grid; grid-template-columns: 1fr 280px; gap: 16px; align-items: start; }
@media (max-width: 1100px) { .pf-grid { grid-template-columns: 1fr; } }
.pf-main { min-width: 0; display: flex; flex-direction: column; gap: 16px; }
.pf-head { display: flex; align-items: center; gap: 18px; padding: 18px 20px; }
.pf-head .vt-pet-avatar.lg { width: 84px; height: 84px; border: 3px solid var(--teal); }
.pf-head-id { flex: 1; min-width: 0; }
.pf-name { font-size: 30px; font-weight: 800; color: var(--navy); line-height: 1.1; }
.pf-sub { display: flex; gap: 18px; margin-top: 4px; font-size: 14px; color: var(--muted); }
.pf-sub span { display: inline-flex; align-items: center; gap: 5px; }
.pf-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.pf-pill { font-size: 12.5px; font-weight: 700; padding: 5px 12px; border-radius: 999px; }
.pf-pill.red { background: #fbe7e3; color: #c43a28; }
.pf-pill.amber { background: #fbefdc; color: #9a6311; }
.pf-next { text-align: right; font-size: 13.5px; font-weight: 600; color: var(--muted); flex: none; }
.pf-next span { display: inline-flex; align-items: center; gap: 6px; }
.pf-tabs { display: flex; flex-wrap: wrap; gap: 8px; }
.pf-tab { padding: 9px 16px; border-radius: 999px; font-weight: 700; font-size: 13.5px; color: var(--muted); border: 1px solid transparent; }
.pf-tab:hover { background: var(--bg); }
.pf-tab.on { border-color: var(--teal); color: var(--teal-d); }
.pf-overview { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; align-items: start; }
@media (max-width: 1100px) { .pf-overview { grid-template-columns: 1fr 1fr; } }
@media (max-width: 700px) { .pf-overview { grid-template-columns: 1fr; } }
.pf-ocard { padding: 0; overflow: hidden; }
.pf-ocard-hd { display: flex; align-items: center; gap: 10px; padding: 13px 15px; border-bottom: 1px solid var(--line-2); font-size: 15px; font-weight: 800; color: var(--navy); }
.pf-ocard-hd.teal { background: var(--teal); color: #fff; border-bottom: none; }
.pf-ocard-hd i { display: block; font-size: 11px; font-weight: 600; opacity: .85; font-style: normal; }
.pf-vitals { padding: 14px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pf-vitals span { font-size: 12px; color: var(--muted); display: block; }
.pf-vitals b { font-size: 16px; font-weight: 800; color: var(--ink); }
.pf-text { padding: 14px 15px; font-size: 12.5px; line-height: 1.55; color: var(--ink); }
.pf-text p { margin: 0 0 7px; }
.pf-text b { font-weight: 700; }
.pf-empty { color: var(--faint); font-size: 12.5px; }
.pf-proc { padding: 8px 15px 14px; }
.pf-proc-row { padding: 9px 0; border-bottom: 1px solid var(--line-2); cursor: pointer; font-size: 12.5px; }
.pf-proc-row:hover { color: var(--teal-d); }
.pf-proc-date { display: block; color: var(--muted); font-size: 12px; }
.pf-proc-row b { display: block; font-weight: 700; margin-top: 1px; }
.pf-proc-ok { color: var(--green); font-weight: 700; }
.pf-proc-pend { color: var(--amber); font-weight: 700; }
.pf-proc-row i { color: var(--muted); font-style: normal; }
.pf-vertodos { width: 100%; margin-top: 12px; border: 1px solid var(--line); border-radius: 999px; padding: 10px; font-weight: 700; font-size: 13px; color: var(--ink); }
.pf-vertodos:hover { border-color: var(--teal); color: var(--teal-d); }
.pf-anexos { padding: 14px 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pf-anexo { font-size: 11px; color: var(--muted); text-align: center; }
.pf-anexo img, .pf-anexo-ph { width: 100%; height: 76px; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); display: block; margin-bottom: 5px; }
.pf-anexo-ph { display: grid; place-items: center; background: var(--bg); font-weight: 800; color: var(--muted); }
.pf-edit-row { display: flex; align-items: center; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
/* aside */
.pf-aside { display: flex; flex-direction: column; gap: 16px; position: sticky; top: 0; }
.pf-aside-title { font-size: 16px; font-weight: 800; margin: 0 0 14px; display: flex; align-items: center; gap: 8px; }
.pf-aside-title.alert { color: #c43a28; display: flex; align-items: center; gap: 8px; }
.pf-owner { padding: 18px; }
.pf-owner-name { font-size: 15px; font-weight: 800; margin: -4px 0 10px; }
.pf-owner-rows { display: flex; flex-direction: column; }
.pf-owner-row { display: flex; justify-content: space-between; gap: 14px; padding: 8px 0; border-bottom: 1px solid var(--line-2); font-size: 13px; }
.pf-owner-row:last-child { border-bottom: none; }
.pf-owner-row span { color: var(--muted); flex: none; }
.pf-owner-row b { font-weight: 700; text-align: right; }
.pf-actions { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
.pf-act { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 10px; font-weight: 700; font-size: 13px; line-height: 1.25; text-align: center; min-height: 44px; }
.pf-act.teal { background: var(--teal); color: #fff; }
.pf-act.navy { background: var(--navy); color: #fff; }
.pf-act:hover { filter: brightness(1.08); }
.pf-alerts { padding: 18px; border: 1px solid #f6d4cf; }
.pf-alert-row { padding: 9px 0; border-bottom: 1px solid var(--line-2); }
.pf-alert-row:last-child { border-bottom: none; }
.pf-alert-row b { display: block; font-size: 13px; font-weight: 700; color: var(--navy); }
.pf-alert-row span { font-size: 12.5px; color: var(--muted); }
.ag-detail-actions .vt-btn-primary, .ag-detail-actions .vt-btn-ghost { padding: 11px 8px; font-size: 13.5px; }
.ag-month { padding: 0; overflow: hidden; }
.ag-month-head { display: grid; grid-template-columns: repeat(7, 1fr); }
.ag-month-head div { padding: 10px; text-align: center; font-size: 11.5px; font-weight: 700; text-transform: uppercase; color: var(--faint); border-bottom: 1px solid var(--line); }
.ag-month-grid { display: grid; grid-template-columns: repeat(7, 1fr); grid-auto-rows: minmax(96px, 1fr); }
.ag-mcell { border-left: 1px solid var(--line-2); border-bottom: 1px solid var(--line-2); padding: 5px; cursor: pointer; overflow: hidden; }
.ag-mcell:hover { background: var(--bg); }
.ag-mcell.out { background: #fafbfc; }
.ag-mcell.out .ag-mnum { color: var(--faint); }
.ag-mcell.today { background: var(--teal-t); }
.ag-mnum { display: inline-block; font-size: 13px; font-weight: 700; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; }
.ag-mcell.today .ag-mnum { background: var(--teal); color: #fff; }
.ag-mevs { display: flex; flex-direction: column; gap: 2px; margin-top: 2px; }
.ag-mev { font-size: 10.5px; font-weight: 600; color: #fff; border-radius: 4px; padding: 2px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ag-mmore { font-size: 10.5px; color: var(--muted); font-weight: 700; padding-left: 3px; }
.vt-cal-grid { display: grid; }
.vt-cal-corner { border-bottom: 1px solid var(--line); }
.vt-cal-dayhead { padding: 13px 8px; text-align: center; font-weight: 700; font-size: 13.5px; border-bottom: 1px solid var(--line); border-left: 1px solid var(--line-2); }
.vt-cal-hour { font-size: 11.5px; color: var(--faint); font-weight: 600; padding: 6px 8px; text-align: right; height: 54px; }
.vt-cal-cell { border-left: 1px solid var(--line-2); border-bottom: 1px solid var(--line-2); height: 54px; position: relative; padding: 2px; }
.vt-cal-cell-click { cursor: pointer; }
.vt-cal-cell-click:hover { background: var(--teal-t); }
.vt-appt { cursor: pointer; }
.vt-appt { position: absolute; left: 3px; right: 3px; top: 3px; border-radius: 8px; border-left: 3px solid; padding: 5px 7px; overflow: hidden; z-index: 2; }
.vt-appt-time { display: block; font-size: 10.5px; font-weight: 700; }
.vt-appt-pat { display: block; font-size: 12.5px; font-weight: 700; }
.vt-appt-kind { display: block; font-size: 11px; color: var(--muted); }

/* ============ Kanban ============ */
.vt-kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: start; }
.vt-kan-col { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 14px; }
.vt-kan-head { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; margin-bottom: 12px; }
.vt-kan-head i { margin-left: auto; font-style: normal; font-size: 12px; color: var(--muted); background: var(--bg); padding: 2px 8px; border-radius: 999px; }
.vt-dot { width: 9px; height: 9px; border-radius: 50%; }
.vt-dot.amber { background: var(--amber); } .vt-dot.teal { background: var(--teal); } .vt-dot.green { background: var(--green); }
.vt-kan-card { background: var(--bg); border-radius: 11px; padding: 12px; margin-bottom: 10px; }
.vt-kan-pat { font-weight: 800; font-size: 14px; }
.vt-kan-proc { font-size: 13px; color: var(--muted); margin: 3px 0 9px; }

.vt-at-item { display: flex; gap: 14px; }

.vt-integ { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; }
.vt-integ-name { font-weight: 700; font-size: 14.5px; }
.vt-toggle { width: 42px; height: 24px; border-radius: 999px; background: #cfd6dd; position: relative; transition: background .15s; cursor: pointer; }
.vt-toggle i { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .15s; }
.vt-toggle.on { background: var(--teal); }
.vt-toggle.on i { left: 21px; }

/* ============ IA ============ */
.vt-ia-wrap { max-width: 900px; margin: 0 auto; height: 100%; display: flex; flex-direction: column; }
.vt-ia-roles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.vt-ia-role { display: flex; align-items: center; gap: 12px; background: #fff; border: 1px solid var(--line); border-radius: 13px; padding: 13px 15px; text-align: left; }
.vt-ia-role.active { border-color: var(--teal); box-shadow: inset 0 0 0 1px var(--teal), var(--shadow); }
.vt-ia-role-ic { width: 40px; height: 40px; border-radius: 11px; background: var(--teal-t); color: var(--teal-d); display: grid; place-items: center; flex: none; }
.vt-ia-role-txt b { display: block; font-size: 14px; font-weight: 700; }
.vt-ia-role-txt i { font-size: 11.5px; color: var(--muted); font-style: normal; line-height: 1.3; display: block; margin-top: 2px; }
.vt-ia-chat { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 0; overflow: hidden; }
.vt-ia-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
.vt-ia-msg { display: flex; gap: 10px; max-width: 86%; }
.vt-ia-msg.me { align-self: flex-end; flex-direction: row-reverse; }
.vt-ia-ava { width: 30px; height: 30px; border-radius: 9px; background: var(--navy); color: var(--teal); display: grid; place-items: center; flex: none; }
.vt-ia-bubble { background: var(--bg); border-radius: 13px; padding: 11px 14px; font-size: 14px; line-height: 1.5; }
.vt-ia-bubble p { margin: 0; } .vt-ia-bubble p:empty { height: 7px; }
.vt-ia-msg.me .vt-ia-bubble { background: var(--teal); color: #fff; }
.vt-ia-bubble.typing { display: flex; gap: 4px; align-items: center; }
.vt-ia-bubble.typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--faint); animation: vtblink 1.2s infinite; }
.vt-ia-bubble.typing span:nth-child(2) { animation-delay: .2s; } .vt-ia-bubble.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes vtblink { 0%, 60%, 100% { opacity: .3; } 30% { opacity: 1; } }
.vt-ia-chips { display: flex; flex-wrap: wrap; gap: 8px; padding: 0 20px 12px; }
.vt-ia-chip { background: #fff; border: 1px solid var(--line); border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 600; color: var(--ink); }
.vt-ia-chip:hover { border-color: var(--teal); color: var(--teal-d); }
.vt-ia-input { display: flex; gap: 10px; padding: 14px 16px; border-top: 1px solid var(--line); }
.vt-ia-quick { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px 0; }
.vt-ia-qbtn { display: inline-flex; align-items: center; gap: 7px; background: var(--teal-t, #e2f4f3); border: 1px solid transparent; border-radius: 999px; padding: 8px 13px; font-size: 13px; font-weight: 700; color: var(--teal-d); }
.vt-ia-qbtn:hover:not(:disabled) { background: #fff; border-color: var(--teal); }
.vt-ia-qbtn:disabled { opacity: .5; }
.vt-ia-qbtn.ghost { background: #fff; border-color: var(--line); color: var(--muted); font-weight: 600; }
.vt-ia-badge { display: inline-flex; align-items: center; gap: 7px; background: var(--teal-t, #e2f4f3); color: var(--teal-d); border: 1px solid var(--teal); border-radius: 999px; padding: 7px 13px; font-size: 12.5px; font-weight: 700; }
.vt-ia-li { margin: 0; padding-left: 16px; position: relative; }
.vt-ia-li::before { content: '•'; position: absolute; left: 2px; color: var(--teal-d); font-weight: 800; }
.vt-ia-li.num { padding-left: 4px; } .vt-ia-li.num::before { content: ''; }
.vt-ia-input input { flex: 1; font-family: inherit; font-size: 14px; border: 1px solid var(--line); border-radius: 11px; padding: 11px 14px; }
.vt-ia-input input:focus { outline: none; border-color: var(--teal); }
.vt-ia-send { display: inline-flex; align-items: center; gap: 7px; background: var(--teal); color: #fff; font-weight: 700; font-size: 14px; padding: 0 18px; border-radius: 11px; }
.vt-ia-send:disabled { opacity: .5; }
.vt-ia-disclaimer { font-size: 11.5px; color: var(--faint); text-align: center; padding: 0 16px 12px; }

/* ── VetIA Pro extras ── */
.vt-ia-voice { width: 40px; height: 40px; border: 1.5px solid var(--line); border-radius: 11px; background: var(--panel-2); font-size: 17px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex: none; transition: background .15s; }
.vt-ia-voice:hover { background: var(--teal-t); border-color: var(--teal); }
.vt-ia-voice.listening { background: #fef2f2; border-color: var(--danger); animation: vt-pulse 1s infinite; }
@keyframes vt-pulse { 0%,100% { opacity:1 } 50% { opacity:.5 } }
.vt-ia-acard { display: flex; align-items: center; gap: 10px; background: var(--panel); border: 1.5px solid var(--teal); border-radius: 12px; padding: 10px 14px; margin: 8px 0 0 38px; }
.vt-ia-acard-ic { font-size: 22px; flex: none; }
.vt-ia-acard-info { flex: 1; min-width: 0; }
.vt-ia-acard-info b { display: block; font-size: 13px; font-weight: 700; color: var(--ink); }
.vt-ia-acard-info i { font-style: normal; font-size: 12px; color: var(--muted); }
.vt-ia-acard-btn { background: var(--teal); color: #fff; border: none; border-radius: 9px; padding: 7px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.vt-ia-acard-btn:disabled { background: var(--muted); cursor: default; }

/* ============ Auth (login / cadastro) ============ */
.vt-auth { display: grid; grid-template-columns: 1.1fr 1fr; height: 100%; }
.vt-auth-art { background: linear-gradient(145deg, #091e35 0%, #0d2a42 35%, #0b3540 65%, #0a2e38 100%); color: #fff; padding: 52px 56px; display: flex; flex-direction: column; }
.vt-auth-brand { display: flex; align-items: center; gap: 12px; margin-bottom: 0; }
.vt-auth-tag { font-size: 38px; font-weight: 800; line-height: 1.1; letter-spacing: -.02em; margin: 0 0 16px; }
.vt-auth-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 13px; }
.vt-auth-list li { display: flex; align-items: center; gap: 13px; font-size: 14.5px; color: #b8cfdf; font-weight: 500; }
.vt-auth-foot { font-size: 12.5px; }
/* painel direito */
.vt-auth-form-wrap { display: grid; place-items: center; padding: 30px; background: #f3f6fb; }
.vt-auth-card { width: 100%; max-width: 400px; background: #fff; border: 1px solid #e4eaf3; border-radius: 22px; box-shadow: 0 4px 6px rgba(14,44,77,.04), 0 16px 48px rgba(14,44,77,.1); padding: 36px; }
/* tabs */
.vt-auth-tabs { display: flex; background: #f0f4f9; border-radius: 12px; padding: 4px; gap: 3px; margin-bottom: 24px; }
.vt-auth-tabs button { flex: 1; padding: 10px; border-radius: 9px; font-weight: 700; font-size: 14px; color: var(--muted); transition: all .15s; }
.vt-auth-tabs button.active { background: #fff; color: var(--navy); box-shadow: 0 1px 3px rgba(14,44,77,.12), 0 4px 12px rgba(14,44,77,.06); }
/* título */
.vt-auth-title { font-size: 24px; font-weight: 800; margin: 0 0 5px; color: var(--navy); letter-spacing: -.01em; }
.vt-auth-sub { color: var(--muted); font-size: 14px; margin: 0 0 22px; }
.vt-auth-card .vtf { margin-bottom: 13px; }
.vtf-eye { position: absolute; right: 9px; background: none; font-size: 15px; padding: 4px; }
/* mensagem de erro */
.vt-auth-err { background: #fff0ee; color: #b23a28; border: 1px solid #fcd4ce; border-radius: 10px; padding: 10px 14px; font-size: 13px; font-weight: 600; margin: 4px 0 12px; display: flex; align-items: center; gap: 8px; }
.vt-auth-err::before { content: '⚠️'; font-size: 15px; }
/* botão principal com gradiente */
.vt-auth-submit { width: 100%; background: linear-gradient(135deg, #16bdb4 0%, #0f8f88 100%); color: #fff; font-weight: 800; font-size: 15px; padding: 14px; border-radius: 12px; margin-top: 4px; transition: transform .12s, box-shadow .12s; box-shadow: 0 4px 14px rgba(15,143,136,.35); letter-spacing: .01em; }
.vt-auth-submit:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(15,143,136,.45); }
.vt-auth-submit:active:not(:disabled) { transform: translateY(0); }
.vt-auth-submit:disabled { opacity: .6; cursor: not-allowed; box-shadow: none; }
/* links */
.vt-auth-switch { text-align: center; font-size: 13.5px; color: var(--muted); margin-top: 16px; }
.vt-auth-switch button { color: var(--teal-d); font-weight: 800; }
.vt-auth-demo { text-align: center; font-size: 12px; color: var(--faint); margin-top: 12px; }
.vt-auth-forgot { font-size: 12.5px; font-weight: 700; color: var(--teal-d); background: none; border: none; cursor: pointer; padding: 0; }
.vt-auth-codebox { background: var(--teal-t); border: 1px dashed var(--teal); border-radius: 9px; padding: 10px 12px; font-size: 13px; color: var(--teal-d); margin-bottom: 12px; }
.vt-auth-codebox b { font-size: 16px; letter-spacing: 2px; }
@keyframes vt-spin-a { to { transform: rotate(360deg); } }
.vt-spin { display: inline-block; width: 14px; height: 14px; border: 2.5px solid rgba(255,255,255,.35); border-top-color: #fff; border-radius: 50%; animation: vt-spin-a .7s linear infinite; vertical-align: middle; }
@media (max-width: 860px) { .vt-auth { grid-template-columns: 1fr; } .vt-auth-art { display: none; } }

/* user menu */
.vt-user { cursor: pointer; }
.vt-user-menu { position: absolute; top: 46px; right: 0; width: 230px; background: #fff; border: 1px solid var(--line); border-radius: 13px; box-shadow: var(--shadow); padding: 8px; z-index: 60; }
.vt-user-menu-head { padding: 10px 12px; border-bottom: 1px solid var(--line-2); margin-bottom: 6px; }
.vt-user-menu-head b { display: block; font-size: 14px; }
.vt-user-menu-head i { display: block; font-size: 12px; color: var(--muted); font-style: normal; margin-top: 2px; }
.vt-user-menu-head span { display: inline-block; font-size: 11.5px; color: var(--teal-d); background: var(--teal-t); padding: 2px 8px; border-radius: 999px; margin-top: 7px; font-weight: 600; }
.vt-user-menu-item { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; padding: 9px 12px; border-radius: 9px; font-weight: 600; font-size: 13.5px; color: var(--red); }
.vt-user-menu-item:hover { background: var(--red-t); }
.vt-user-menu-item .vt-ic { transform: rotate(90deg); }
/* user menu items (new style) */
.vt-umi { display: flex; align-items: center; gap: 10px; width: 100%; text-align: left; padding: 9px 12px; border-radius: 9px; font-weight: 600; font-size: 13.5px; cursor: pointer; border: none; background: none; font-family: inherit; transition: background .15s; }
.vt-umi:hover { background: var(--bg); }
.vt-umi-ic { font-size: 16px; width: 22px; text-align: center; flex: none; }
/* dark mode */
body.vt-dark { --bg: #0f1923; --card: #162233; --ink: #e2eaf3; --muted: #7a91a8; --faint: #4a6070; --line: #1e3048; --line-2: #1a2c3e; --navy: #0a1927; --shadow: 0 1px 4px rgba(0,0,0,.3), 0 6px 20px rgba(0,0,0,.4); }
body.vt-dark .vt-sidebar { background: #060e18; }
body.vt-dark .vt-topbar { background: #0d1b2a; border-color: #1e3048; }
body.vt-dark .vt-user-menu, body.vt-dark .fin-modal { background: #162233; border-color: #1e3048; }
body.vt-dark .vt-card, body.vt-dark .vt-sec { background: #162233; }
body.vt-dark input, body.vt-dark select, body.vt-dark textarea { background: #0f1923; color: #e2eaf3; border-color: #1e3048; }
body.vt-dark .vt-avatar { background: #1e3a50; }
body.vt-dark .vt-umi:hover { background: #1e3048; }
body.vt-dark .vt-search { background: #162233; border-color: #1e3048; }
body.vt-dark .vt-search input { background: transparent; color: #e2eaf3; }

/* ============ Upload de foto / check inline ============ */
.vt-photo-up { width: 96px; height: 96px; border-radius: 16px; border: 2px dashed var(--line); display: grid; place-items: center; cursor: pointer; overflow: hidden; flex: none; background: var(--bg); }
.vt-photo-up:hover { border-color: var(--teal); }
.vt-photo-img { width: 100%; height: 100%; object-fit: cover; }
.vt-photo-ph { display: flex; flex-direction: column; align-items: center; gap: 5px; color: var(--faint); }
.vt-photo-ph i { font-size: 11px; font-style: normal; font-weight: 600; }
.vt-check-inline { display: inline-flex; align-items: center; gap: 7px; font-size: 14px; font-weight: 600; cursor: pointer; padding: 9px 0; }
.vt-check-inline input { width: 17px; height: 17px; accent-color: var(--teal); }

/* ============ Financeiro avançado ============ */
.fin-tabs { display: flex; flex-wrap: nowrap; width: fit-content; max-width: 100%; overflow-x: auto; scrollbar-width: thin; background: #fff; border: 1px solid var(--line); border-radius: 11px; padding: 4px; gap: 2px; margin-bottom: 20px; }
.fin-tabs button { padding: 9px 16px; border-radius: 8px; font-weight: 600; font-size: 13.5px; color: var(--muted); white-space: nowrap; }
.fin-tabs button.active { background: var(--teal); color: #fff; }
.fin-row3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-bottom: 16px; }
.fin-row4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 16px; }
.fin-kpi { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; }
.fin-kpi .lbl { font-size: 12.5px; color: var(--muted); font-weight: 600; }
.fin-kpi .val { font-size: 23px; font-weight: 800; margin-top: 4px; }
.fin-kpi .val.up { color: var(--green); } .fin-kpi .val.down { color: var(--red); }
.fin-kpi .sub { font-size: 11.5px; color: var(--faint); margin-top: 2px; }
.fin-caixa-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 16px; }
.fin-caixa-status { display: inline-flex; align-items: center; gap: 9px; font-weight: 700; font-size: 15px; }
.fin-caixa-status .pulse { width: 11px; height: 11px; border-radius: 50%; }
.fin-caixa-status .pulse.on { background: var(--green); box-shadow: 0 0 0 4px var(--green-t); }
.fin-caixa-status .pulse.off { background: #c0c9d2; }
.fin-method-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; margin-bottom: 16px; }
.fin-method { background: #fff; border: 1px solid var(--line); border-radius: 14px; padding: 16px 18px; display: flex; align-items: center; gap: 14px; }
.fin-method-ic { width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center; font-size: 21px; flex: none; }
.fin-method .m-lbl { font-size: 13px; color: var(--muted); font-weight: 600; }
.fin-method .m-val { font-size: 20px; font-weight: 800; }
.fin-period { display: inline-flex; background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 3px; gap: 2px; }
.fin-period button { padding: 7px 14px; border-radius: 7px; font-weight: 600; font-size: 13px; color: var(--muted); }
.fin-period button.active { background: var(--navy); color: #fff; }
.fin-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
.fin-list { display: flex; flex-direction: column; }
.fin-item { display: grid; grid-template-columns: 1fr auto auto auto; gap: 14px; align-items: center; padding: 12px 4px; border-bottom: 1px solid var(--line-2); }
.fin-item:last-child { border-bottom: none; }
.fin-item .desc b { font-weight: 700; font-size: 14px; }
.fin-item .desc i { display: block; font-size: 11.5px; color: var(--faint); font-style: normal; margin-top: 2px; }
.fin-tagm { font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
.fin-tagm.dinheiro { background: var(--green-t); color: var(--green); }
.fin-tagm.cartao { background: #e6edf4; color: var(--navy); }
.fin-tagm.pix { background: var(--teal-t); color: var(--teal-d); }
.fin-tagm.boleto { background: var(--amber-t); color: var(--amber); }
.fin-tagm.pend { background: var(--red-t); color: var(--red); }
.fin-amt { font-weight: 800; font-size: 14.5px; text-align: right; min-width: 96px; }
.fin-amt.up { color: var(--green); } .fin-amt.down { color: var(--red); }
.fin-baixa { background: var(--teal); color: #fff; font-weight: 700; font-size: 12.5px; padding: 7px 13px; border-radius: 8px; }
.fin-del { color: var(--faint); font-size: 17px; padding: 0 4px; } .fin-del:hover { color: var(--red); }
.fin-addbar { display: grid; grid-template-columns: 2fr 1.2fr 1fr 1fr auto; gap: 10px; align-items: end; background: var(--bg); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
.fin-addbar .vtf { min-width: 0; }
.fin-addbar select.vtf-input, .fin-addbar input.vtf-input { padding: 9px 10px; }
.fin-add-btn { background: var(--navy); color: #fff; font-weight: 700; font-size: 13.5px; padding: 10px 16px; border-radius: 10px; white-space: nowrap; height: 39px; }
.fin-modal-bg { position: fixed; inset: 0; background: rgba(15,40,61,.45); display: grid; place-items: center; z-index: 100; }
.fin-modal { background: #fff; border-radius: 16px; padding: 24px; width: 380px; box-shadow: var(--shadow); position: relative; }
.fin-modal-x { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 8px; font-size: 22px; line-height: 1; color: var(--faint); display: grid; place-items: center; }
.fin-modal-x:hover { background: var(--bg); color: var(--ink); }
.fin-modal h3 { margin: 0 0 4px; font-size: 18px; font-weight: 800; }
.fin-modal p { margin: 0 0 16px; color: var(--muted); font-size: 13.5px; }
.fin-method-pick { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
.fin-method-opt { display: flex; align-items: center; gap: 10px; padding: 13px; border: 1px solid var(--line); border-radius: 11px; font-weight: 700; font-size: 14px; }
.fin-method-opt:hover { border-color: var(--teal); background: var(--teal-t); }
.fin-modal-actions { display: flex; justify-content: flex-end; gap: 10px; }
.fin-bars2 { display: flex; align-items: flex-end; gap: 10px; height: 200px; padding-top: 10px; }
.fin-bg2 { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; gap: 6px; }
.fin-bpair { display: flex; align-items: flex-end; gap: 3px; height: 100%; width: 100%; justify-content: center; }
.fin-bar2 { width: 40%; border-radius: 5px 5px 0 0; min-height: 2px; }
.fin-bar2.r { background: var(--teal); } .fin-bar2.c { background: #cdd6df; }
.fin-blbl { font-size: 11px; color: var(--faint); font-weight: 600; }
.fin-cat-list { display: flex; flex-direction: column; gap: 9px; }
.fin-cat-row { display: flex; align-items: center; gap: 10px; font-size: 13.5px; }
.fin-cat-bar { flex: 1; height: 9px; background: var(--bg); border-radius: 999px; overflow: hidden; }
.fin-cat-fill { display: block; height: 100%; border-radius: 999px; }
.fin-cat-val { font-weight: 700; min-width: 90px; text-align: right; }
/* ===== Finanças · Visão Geral (cards premium) ===== */
.fin-ov-kpis { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 18px; }
@media (max-width: 1200px) { .fin-ov-kpis { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 760px) { .fin-ov-kpis { grid-template-columns: 1fr 1fr; } }
.fin-ov-card { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 18px; box-shadow: 0 1px 2px rgba(16,40,61,.04), 0 12px 30px -16px rgba(16,40,61,.26); position: relative; overflow: hidden; }
.fin-ov-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--teal); }
.fin-ov-card.up::before { background: var(--green); } .fin-ov-card.down::before { background: var(--red); } .fin-ov-card.neutral::before { background: var(--navy); }
.fin-ov-ic { width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center; margin-bottom: 12px; }
.fin-ov-l { font-size: 12.5px; color: var(--muted); font-weight: 600; }
.fin-ov-v { font-size: 24px; font-weight: 800; line-height: 1.1; margin-top: 3px; letter-spacing: -.01em; }
.fin-ov-v.up { color: var(--green); } .fin-ov-v.down { color: var(--red); }
.fin-ov-sub { font-size: 11.5px; color: var(--faint); margin-top: 3px; font-weight: 600; }
.fin-prem { box-shadow: 0 1px 2px rgba(16,40,61,.04), 0 12px 30px -18px rgba(16,40,61,.22); border-radius: 16px; }
.fin-ov-grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; margin-bottom: 16px; }
@media (max-width: 1000px) { .fin-ov-grid2 { grid-template-columns: 1fr; } }
.fin-bg2.on .fin-bar2.r { background: var(--teal-d); } .fin-bg2.on .fin-blbl { color: var(--teal-d); font-weight: 800; }
