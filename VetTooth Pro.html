.pr-sys-chev.open { transform: rotate(180deg); }

/* ---- Checklist (anamnese rápida / odonto) ---- */
.pr-checks { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 9px; }
.pr-check { display: flex; align-items: center; gap: 10px; padding: 11px 13px; border: 1px solid var(--line); border-radius: 11px; font-size: 13.5px; font-weight: 600; cursor: pointer; background: #fff; transition: border-color .12s, background .12s; }
.pr-check:hover { border-color: var(--teal); }
.pr-check.on { border-color: var(--teal); background: var(--teal-t); color: var(--teal-d); font-weight: 700; }
.pr-check-box { width: 19px; height: 19px; border-radius: 6px; border: 2px solid var(--line); display: grid; place-items: center; flex: none; color: #fff; font-size: 12px; font-weight: 900; }
.pr-check.on .pr-check-box { background: var(--teal); border-color: var(--teal); }

/* botões rápidos de resposta (anamnese) */
.pr-quickpick { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.pr-quickpick button { font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); background: #fff; }
.pr-quickpick button:hover { border-color: var(--teal); color: var(--teal-d); }
.pr-quickpick button.on { background: var(--teal); border-color: var(--teal); color: #fff; }

/* ---- Modelos de consulta ---- */
.pr-models { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
.pr-model { text-align: left; padding: 14px; border: 1px solid var(--line); border-radius: 12px; background: #fff; display: flex; gap: 11px; align-items: center; }
.pr-model:hover { border-color: var(--teal); transform: translateY(-1px); box-shadow: var(--shadow); }
.pr-model-ic { width: 38px; height: 38px; border-radius: 10px; background: var(--teal-t); color: var(--teal-d); display: grid; place-items: center; flex: none; }
.pr-model b { display: block; font-size: 13.5px; font-weight: 700; }
.pr-model i { display: block; font-size: 11.5px; color: var(--muted); font-style: normal; margin-top: 2px; }

/* ---- Tabelas dinâmicas (prescrição / procedimento / orçamento) ---- */
.pr-dtable { width: 100%; border-collapse: collapse; font-size: 13.5px; }
.pr-dtable th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); padding: 8px 10px; border-bottom: 1px solid var(--line); }
.pr-dtable td { padding: 9px 10px; border-bottom: 1px solid var(--line-2); vertical-align: middle; }
.pr-dtable tr:last-child td { border-bottom: none; }
.pr-dtable .num { text-align: right; font-variant-numeric: tabular-nums; }
.pr-dtable input, .pr-dtable select { width: 100%; font-family: inherit; font-size: 13px; border: 1px solid transparent; border-radius: 7px; padding: 6px 8px; background: var(--bg); }
.pr-dtable input:focus, .pr-dtable select:focus { outline: none; border-color: var(--teal); background: #fff; }
.pr-dtable input.num { text-align: right; }
.pr-del-btn { color: var(--faint); font-size: 16px; padding: 2px 6px; border-radius: 6px; }
.pr-del-btn:hover { color: var(--red); background: var(--red-t); }
.pr-addrow { display: inline-flex; align-items: center; gap: 6px; margin-top: 12px; color: var(--teal-d); font-weight: 700; font-size: 13px; padding: 8px 12px; border: 1px dashed var(--line); border-radius: 9px; }
.pr-addrow:hover { border-color: var(--teal); background: var(--teal-t); }

/* totais orçamento */
.pr-totals { display: flex; flex-direction: column; gap: 9px; }
.pr-total-row { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; }
.pr-total-row span:first-child { color: var(--muted); font-weight: 600; }
.pr-total-row b { font-weight: 700; font-variant-numeric: tabular-nums; }
.pr-total-row.grand { border-top: 1px solid var(--line); padding-top: 10px; margin-top: 2px; font-size: 16px; }
.pr-total-row.grand b { font-size: 20px; font-weight: 800; color: var(--teal-d); }
.pr-total-row.profit b { color: var(--green); }

/* ---- Exames (chips selecionáveis) ---- */
.pr-examgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 9px; }
.pr-exam { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 11px; font-size: 13.5px; font-weight: 600; cursor: pointer; background: #fff; }
.pr-exam:hover { border-color: var(--teal); }
.pr-exam.on { border-color: var(--navy); background: #eef3f8; }
.pr-exam .vt-ic { color: var(--teal-d); flex: none; }

/* ---- Anexos (dropzone) ---- */
.pr-drop { border: 2px dashed var(--line); border-radius: 14px; padding: 30px; text-align: center; color: var(--muted); cursor: pointer; transition: border-color .12s, background .12s; }
.pr-drop:hover, .pr-drop.drag { border-color: var(--teal); background: var(--teal-t); }
.pr-drop-ic { width: 52px; height: 52px; border-radius: 14px; background: var(--teal-t); color: var(--teal-d); display: grid; place-items: center; margin: 0 auto 12px; }
.pr-files { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-top: 16px; }
.pr-file { display: flex; align-items: center; gap: 11px; padding: 12px; border: 1px solid var(--line); border-radius: 11px; background: #fff; }
.pr-file-ic { width: 38px; height: 38px; border-radius: 9px; display: grid; place-items: center; font-size: 11px; font-weight: 800; color: #fff; flex: none; }
.pr-file b { font-size: 13px; font-weight: 700; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pr-file i { font-size: 11px; color: var(--faint); font-style: normal; }
.pr-file-img { width: 38px; height: 38px; border-radius: 9px; object-fit: cover; flex: none; }

/* ---- Finalização ---- */
.pr-final-check { display: flex; align-items: flex-start; gap: 11px; padding: 12px 0; border-bottom: 1px solid var(--line-2); }
.pr-final-check:last-child { border-bottom: none; }
.pr-final-check .ic { width: 24px; height: 24px; border-radius: 7px; background: var(--green-t); color: var(--green); display: grid; place-items: center; flex: none; font-weight: 900; font-size: 13px; }
.pr-final-check b { font-size: 14px; font-weight: 700; }
.pr-final-check p { margin: 2px 0 0; font-size: 12.5px; color: var(--muted); line-height: 1.4; }
.pr-sign { border: 1px solid var(--line); border-radius: 12px; overflow: hidden; background: #fff; }
.pr-sign-pad { width: 100%; height: 150px; display: block; touch-action: none; cursor: crosshair; background: repeating-linear-gradient(0deg, transparent, transparent 36px, var(--line-2) 36px, var(--line-2) 37px); }
.pr-sign-foot { display: flex; align-items: center; justify-content: space-between; padding: 9px 13px; border-top: 1px solid var(--line-2); }
.pr-sign-foot span { font-size: 12px; color: var(--muted); font-weight: 600; }
.pr-sign-clear { font-size: 12px; font-weight: 700; color: var(--teal-d); }
.pr-final-bar { position: sticky; bottom: 0; background: var(--card); border-top: 1px solid var(--line); margin: 24px -30px -70px; padding: 16px 30px; display: flex; align-items: center; gap: 14px; }
.pr-final-bar .spacer { flex: 1; }
.pr-finalize { display: inline-flex; align-items: center; gap: 8px; background: var(--green); color: #fff; font-weight: 800; font-size: 15px; padding: 13px 24px; border-radius: 12px; }
.pr-finalize:hover { filter: brightness(1.05); }
.pr-finalize.done { background: var(--muted); pointer-events: none; }

/* ---- Picker de paciente (novo atendimento) ---- */
.pr-pick { display: flex; flex-direction: column; gap: 6px; max-height: 340px; overflow-y: auto; margin: 6px 0 4px; }
.pr-pick-row { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 11px; text-align: left; }
.pr-pick-row:hover { background: var(--teal-t); }
.pr-pick-row b { font-weight: 700; font-size: 14px; }
.pr-pick-row i { display: block; font-size: 12px; color: var(--muted); font-style: normal; }

/* labels de campo reutilizáveis dentro do prontuário */
.pr-field { display: flex; flex-direction: column; gap: 6px; }
.pr-field > span { font-size: 12.5px; font-weight: 600; color: var(--muted); }
.pr-field textarea, .pr-field input, .pr-field select { width: 100%; font-family: inherit; font-size: 14px; color: var(--ink); background: #fff; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; }
.pr-field textarea { min-height: 70px; resize: vertical; line-height: 1.5; }
.pr-field textarea:focus, .pr-field input:focus, .pr-field select:focus { outline: none; border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-t); }
.pr-fieldrow { display: grid; gap: 14px; margin-bottom: 14px; }
.pr-fieldrow.c2 { grid-template-columns: 1fr 1fr; }
.pr-fieldrow.c3 { grid-template-columns: 1fr 1fr 1fr; }
@media (max-width: 900px) { .pr-fieldrow.c2, .pr-fieldrow.c3 { grid-template-columns: 1fr; } }
.pr-empty { color: var(--muted); font-size: 13.5px; padding: 20px; text-align: center; }
.pr-consulta-stack > * { scroll-margin-top: 320px; }
.pr-divider { height: 1px; background: var(--line); margin: 26px 0; }

/* odontogramas realizados */
.pr-charts { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 14px; }
.pr-chart-card { border: 1px solid var(--line); border-radius: 14px; background: #fff; overflow: hidden; text-align: left; transition: border-color .12s, transform .12s, box-shadow .12s; }
.pr-chart-card:hover { border-color: var(--teal); transform: translateY(-2px); box-shadow: var(--shadow); }
.pr-chart-thumb { height: 116px; background: var(--teal-t); display: grid; place-items: center; color: var(--teal-d); border-bottom: 1px solid var(--line); }
.pr-chart-meta { padding: 12px 14px; }
.pr-chart-meta b { font-size: 14px; font-weight: 700; display: block; }
.pr-chart-meta i { font-size: 12px; color: var(--muted); font-style: normal; display: block; margin-top: 2px; }
.pr-chart-new { border: 2px dashed var(--line); border-radius: 14px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; min-height: 178px; color: var(--teal-d); font-weight: 700; font-size: 13.5px; background: #fff; }
.pr-chart-new:hover { border-color: var(--teal); background: var(--teal-t); }
.pr-chart-new .ic { width: 44px; height: 44px; border-radius: 12px; background: var(--teal-t); display: grid; place-items: center; }

/* vacinação */
.vac-sched { display: flex; flex-direction: column; gap: 9px; }
.vac-sched-row { display: flex; align-items: center; gap: 12px; padding: 12px 15px; border: 1px solid var(--line); border-radius: 12px; background: #fff; }
.vac-sched-row.red { border-left: 4px solid var(--red); }
.vac-sched-row.amber { border-left: 4px solid var(--amber); }
.vac-sched-row.teal { border-left: 4px solid var(--teal); }
.vac-sched-row .vac-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
.vac-sched-row.red .vac-dot { background: var(--red); }
.vac-sched-row.amber .vac-dot { background: var(--amber); }
.vac-sched-row.teal .vac-dot { background: var(--teal); }
.vac-sched-row b { font-size: 14px; font-weight: 700; }
.vac-sched-row i { display: block; font-size: 11.5px; color: var(--muted); font-style: normal; margin-top: 1px; }
.vac-due { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 13.5px; }
.vac-table th, .vac-table td { padding: 11px 14px; }
.vac-table td { vertical-align: top; line-height: 1.35; }
.vac-thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 1px solid var(--line); }
.vac-thumb:hover { border-color: var(--teal); }
.vac-photo { border: 2px dashed var(--line); border-radius: 12px; min-height: 90px; display: grid; place-items: center; cursor: pointer; color: var(--muted); font-weight: 600; font-size: 13px; overflow: hidden; }
.vac-photo:hover { border-color: var(--teal); background: var(--teal-t); color: var(--teal-d); }
.vac-photo span { display: inline-flex; align-items: center; gap: 8px; }
.vac-photo img { width: 100%; max-height: 200px; object-fit: contain; }

/* agendados do dia (atendimentos) */
.vt-agday { display: flex; flex-direction: column; gap: 8px; }
.vt-agday-row { display: flex; align-items: center; gap: 14px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px; background: #fff; }
.vt-agday-time { font-weight: 800; font-size: 14px; color: var(--teal-d); width: 52px; flex: none; }
.vt-agday-pat { flex: 1; }
.vt-agday-pat b { font-size: 14px; font-weight: 700; }
.vt-agday-pat i { display: block; font-size: 12px; color: var(--muted); font-style: normal; }

/* estilos de documento (config sistema) */
.vt-doc-styles { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 12px; }
.vt-doc-style { text-align: left; border: 1px solid var(--line); border-radius: 12px; padding: 12px; background: #fff; }
.vt-doc-style.on { border-color: var(--teal); box-shadow: 0 0 0 3px var(--teal-t); }
.vt-doc-style:hover { border-color: var(--teal); }
.vt-doc-style b { display: block; font-size: 13.5px; font-weight: 700; margin-top: 8px; }
.vt-doc-style i { display: block; font-size: 11.5px; color: var(--muted); font-style: normal; margin-top: 1px; }
.vt-doc-style-prev { display: block; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; height: 84px; background: #fff; }
.vt-doc-style-bar { display: flex; align-items: center; height: 26px; padding: 0 8px; }
.vt-doc-style-bar i { width: 28px; height: 12px; border-radius: 3px; background: rgba(255,255,255,.6); }
.vt-doc-style-lines { display: flex; flex-direction: column; gap: 5px; padding: 10px 8px; }
.vt-doc-style-lines i { height: 5px; border-radius: 3px; background: var(--line); width: 100%; }

/* editor rich-text */
.rt-wrap { border: 1px solid var(--line); border-radius: 9px; overflow: hidden; background: #fff; }
.rt-toolbar { display: flex; flex-wrap: wrap; align-items: center; gap: 3px; padding: 6px 8px; background: var(--bg); border-bottom: 1px solid var(--line); }
.rt-btn { min-width: 28px; height: 28px; border-radius: 6px; font-size: 13px; font-weight: 700; color: var(--ink); display: inline-flex; align-items: center; justify-content: center; padding: 0 6px; }
.rt-btn:hover { background: var(--teal-t); color: var(--teal-d); }
.rt-sel { height: 28px; border: 1px solid var(--line); border-radius: 6px; font-size: 12px; font-family: inherit; background: #fff; padding: 0 4px; color: var(--muted); }
.rt-sep { width: 1px; height: 18px; background: var(--line); margin: 0 4px; }
.rt-edit { padding: 10px 12px; font-size: 14px; line-height: 1.5; color: var(--ink); outline: none; }
.rt-edit:empty::before { content: attr(data-ph); color: var(--faint); }
.rt-edit h2 { font-size: 18px; font-weight: 800; margin: 6px 0; }
.rt-edit h3 { font-size: 15px; font-weight: 700; margin: 5px 0; }
.rt-edit ul, .rt-edit ol { margin: 4px 0 4px 20px; }
.rt-edit p { margin: 4px 0; }

/* ===== Prescrição: builder + preview ===== */
.rx-split { display: grid; grid-template-columns: 1fr 420px; gap: 20px; align-items: start; }
@media (max-width: 1100px) { .rx-split { grid-template-columns: 1fr; } }
.rx-bul-list { display: flex; flex-direction: column; gap: 6px; }
.rx-bul-item { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 10px 13px; border: 1px solid var(--line); border-radius: 10px; background: #fff; text-align: left; }
.rx-bul-item:hover { border-color: var(--teal); background: var(--teal-t); }
.rx-bul-item b { font-size: 13.5px; font-weight: 700; }
.rx-bul-item i { display: block; font-size: 11.5px; color: var(--muted); font-style: normal; margin-top: 1px; }
.rx-card { border: 1px solid var(--line); border-radius: 13px; background: #fff; padding: 14px; margin-bottom: 12px; }
.rx-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.rx-card-num { width: 24px; height: 24px; border-radius: 50%; background: var(--teal); color: #fff; display: grid; place-items: center; font-size: 12px; font-weight: 800; flex: none; }
.rx-card-name { flex: 1; font-family: inherit; font-size: 14.5px; font-weight: 700; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
.rx-card-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 12px; }
@media (max-width: 760px) { .rx-card-row { grid-template-columns: 1fr 1fr; } }
.rx-card-row label, .rx-pos-grid label { display: flex; flex-direction: column; gap: 4px; }
.rx-card-row label > span, .rx-pos-grid label > span { font-size: 11px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: .03em; }
.rx-card-row input, .rx-card-row select, .rx-pos-grid input, .rx-pos-grid select { font-family: inherit; font-size: 13px; border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; background: #fff; width: 100%; }
.rx-calc { font-size: 13.5px; font-weight: 800; color: var(--teal-d); padding: 7px 0; }
.rx-sub { font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; color: var(--faint); margin: 4px 0 8px; }
.rx-comp-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.rx-comp-row input, .rx-comp-row select { font-family: inherit; font-size: 13px; border: 1px solid var(--line); border-radius: 8px; padding: 7px 9px; }
.rx-pos { border-top: 1px dashed var(--line); padding-top: 12px; }
.rx-pos-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 760px) { .rx-pos-grid { grid-template-columns: 1fr 1fr; } }
.rx-pos-auto { margin: 10px 0 8px; font-size: 13px; font-weight: 600; color: var(--teal-d); background: var(--teal-t); border-radius: 8px; padding: 8px 11px; }
.rx-pos-free { width: 100%; font-family: inherit; font-size: 13px; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
.rx-pos-toggle-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.rx-pos-label { font-size: 11px; font-weight: 700; color: var(--faint); text-transform: uppercase; letter-spacing: .04em; }
.rx-pos-toggle { display: flex; border: 1px solid var(--teal); border-radius: 8px; overflow: hidden; }
.rx-pos-tab { flex: 1; padding: 5px 16px; font-family: inherit; font-size: 12px; font-weight: 600; border: none; background: transparent; color: var(--teal-d); cursor: pointer; transition: background .15s, color .15s; }
.rx-pos-tab.active { background: var(--teal); color: #fff; }
.rx-pos-textarea { width: 100%; font-family: inherit; font-size: 13px; border: 1px solid var(--line); border-radius: 8px; padding: 9px 11px; resize: vertical; line-height: 1.55; }
.rx-instrucoes { width: 100%; font-family: inherit; font-size: 13px; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; resize: vertical; line-height: 1.6; background: #fff; }
.rx-card-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-bottom: 12px; }
.rx-preview-col { position: sticky; top: 16px; max-height: calc(100vh - 120px); overflow-y: auto; }
.rx-preview-col .doc-page { box-shadow: 0 2px 20px rgba(0,0,0,.10); margin: 0; }

/* editor de documentos */
.doc-modal { width: min(1080px, 96vw); height: 90vh; padding: 0; display: flex; flex-direction: column; }
.doc-toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--line); }
.doc-split { flex: 1; display: grid; grid-template-columns: 360px 1fr; min-height: 0; }
.doc-split.doc-split-full { grid-template-columns: 1fr; }
.doc-preview-full { padding: 28px 48px !important; }
.doc-page { background: #fff; max-width: 680px; margin: 0 auto; padding: 36px 44px; box-shadow: var(--shadow); border-radius: 6px; }
.doc-edit { padding: 16px 18px; border-right: 1px solid var(--line); display: flex; flex-direction: column; }
.doc-textarea { flex: 1; width: 100%; font-family: inherit; font-size: 13.5px; line-height: 1.6; border: 1px solid var(--line); border-radius: 10px; padding: 12px; resize: none; margin-top: 6px; }
.doc-textarea:focus { outline: none; border-color: var(--teal); }
.doc-preview-wrap { overflow-y: auto; background: var(--bg); padding: 24px; }
.doc-head { display: flex; align-items: center; gap: 16px; border-bottom: 2px solid var(--teal); padding-bottom: 14px; }
.doc-logo { width: 60px; height: 60px; border-radius: 10px; object-fit: contain; flex: none; }
.doc-logo-ph { background: var(--teal-t); color: var(--teal-d); display: grid; place-items: center; font-size: 28px; font-weight: 800; }
.doc-head-info { display: flex; flex-direction: column; gap: 2px; }
.doc-head-info b { font-size: 16px; font-weight: 800; }
.doc-head-info span { font-size: 11.5px; color: var(--muted); }
.doc-meta { display: flex; flex-direction: column; gap: 2px; margin: 16px 0; font-size: 13px; }
.doc-body { font-family: inherit; font-size: 13.5px; line-height: 1.7; white-space: pre-wrap; color: var(--ink); margin: 0; }
.doc-signs { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 48px; }
.doc-sign { text-align: center; display: flex; flex-direction: column; align-items: center; }
.doc-sign-img { max-height: 54px; margin-bottom: 4px; }
.doc-sign-line { width: 100%; border-top: 1px solid var(--ink); margin-bottom: 6px; height: 40px; }
.doc-sign b { font-size: 12.5px; font-weight: 700; }
.doc-sign span { font-size: 11px; color: var(--muted); }
@media (max-width: 760px) { .doc-split { grid-template-columns: 1fr; } .doc-edit { display: none; } }

/* barra de fluxo de atendimento */
.pr-flowbar { position: sticky; bottom: 0; z-index: 20; background: var(--card); border-top: 1px solid var(--line); margin: 24px -30px -70px; padding: 14px 30px; display: flex; align-items: center; gap: 18px; box-shadow: 0 -3px 10px -7px rgba(20,40,60,.3); }
.pr-flow-btn { display: inline-flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13.5px; padding: 10px 16px; border-radius: 10px; border: 1px solid var(--line); background: #fff; color: var(--ink); white-space: nowrap; }
.pr-flow-btn:hover { border-color: var(--teal); color: var(--teal-d); background: var(--teal-t); }
.pr-flow-btn.next { background: var(--teal); color: #fff; border-color: var(--teal); }
.pr-flow-btn.next:hover { filter: brightness(1.06); color: #fff; background: var(--teal); }
.pr-flow-arrow { font-size: 18px; line-height: 1; font-weight: 800; }
.pr-flow-mid { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 7px; min-width: 0; }
.pr-flow-step { font-size: 12.5px; font-weight: 600; color: var(--muted); white-space: nowrap; }
.pr-flow-step b { color: var(--ink); font-weight: 800; }
.pr-flow-track { width: 100%; max-width: 460px; height: 6px; border-radius: 999px; background: var(--bg); overflow: hidden; }
.pr-flow-fill { display: block; height: 100%; background: var(--teal); border-radius: 999px; transition: width .3s ease; }
@media (max-width: 760px) { .pr-flow-btn { padding: 9px 11px; font-size: 12px; } .pr-flow-mid { display: none; } }

/* equipe editável */
.vt-team-row { display: grid; grid-template-columns: 1.6fr 1.6fr 1fr 0.7fr; align-items: center; }
.vt-inv-row { display: grid; grid-template-columns: 1.8fr 1fr 1fr 1fr 0.9fr 1.2fr 0.7fr; align-items: center; }
.vt-team-row .vt-avatar { color: #fff; }
.vt-team-row .vt-cell-name { display: flex; align-items: center; gap: 11px; }
.vt-team-row .vt-cell-name b { font-weight: 700; }
.vt-row-actions { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }
.vt-row-actions .vt-link { margin-left: 0; }
/* ===== Estoque (produtos + movimentações) ===== */
.vt-stk-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 18px; }
@media (max-width: 860px) { .vt-stk-summary { grid-template-columns: 1fr; } }
.vt-stk-sum { padding: 18px 20px; display: flex; align-items: center; gap: 14px; }
.vt-stk-sum-ic { width: 46px; height: 46px; border-radius: 13px; display: grid; place-items: center; flex: none; }
.vt-stk-sum-l { font-size: 12.5px; color: var(--muted); font-weight: 600; }
.vt-stk-sum-v { font-size: 22px; font-weight: 800; line-height: 1.1; margin-top: 2px; }
.vt-stk-row { display: grid; grid-template-columns: 1.7fr 1fr .8fr .75fr 1fr 1fr .85fr 1.5fr; align-items: center; gap: 10px; }
.vt-stk-acts { display: flex; gap: 5px; justify-content: flex-end; flex-wrap: wrap; }
.vt-stk-act { font-size: 11.5px; font-weight: 700; padding: 5px 9px; border-radius: 7px; border: 1px solid var(--line); background: #fff; color: var(--muted); white-space: nowrap; line-height: 1; }
.vt-stk-act:hover { border-color: var(--teal); color: var(--teal-d); background: var(--teal-t); }
.vt-stk-act.in { color: var(--green); border-color: #bfe6d2; } .vt-stk-act.in:hover { background: var(--green-t); }
.vt-stk-act.out { color: var(--red); border-color: #f3d2cb; } .vt-stk-act.out:hover { background: var(--red-t); }
.vt-mov-row { display: grid; grid-template-columns: 1.2fr 1.7fr 1fr .9fr 1.2fr; align-items: center; gap: 10px; }
.vt-mov-tipo { font-size: 12px; font-weight: 800; padding: 3px 11px; border-radius: 999px; }
.vt-mov-delta { font-weight: 800; }
.vt-mov-delta.up { color: var(--green); } .vt-mov-delta.down { color: var(--red); }

/* ===== Melhorias clínicas (origem lead / pós-cadastro / atendimentos / finalizar) ===== */
.vt-at-clk { cursor: pointer; border-radius: 10px; margin: -4px -4px 0; padding: 4px; transition: background .12s; }
.vt-at-clk:hover { background: var(--bg); }

/* modal de sucesso pós-cadastro */
.vt-saved-modal { text-align: center; }
.vt-saved-check { width: 58px; height: 58px; border-radius: 50%; background: var(--green-t); color: var(--green); display: grid; place-items: center; margin: 2px auto 12px; }
.vt-saved-actions { display: flex; gap: 10px; justify-content: center; margin-top: 18px; }
.vt-saved-actions .vt-btn-primary, .vt-saved-actions .vt-btn-ghost { flex: 1; justify-content: center; }

/* modal Finalizar Atendimento */
.vt-fz-modal { width: min(560px, 96vw); max-height: 92vh; overflow-y: auto; }
.vt-fz-sec { font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--teal-d); margin: 18px 0 8px; padding-bottom: 5px; border-bottom: 1px solid var(--line); }
.vt-fz-pat { display: flex; align-items: center; gap: 11px; background: var(--bg); border-radius: 10px; padding: 9px 11px; margin-bottom: 10px; }
.vt-fz-pat b { font-weight: 700; display: block; font-size: 14px; }
.vt-fz-pat i { font-style: normal; font-size: 12px; color: var(--muted); display: block; }
.vt-fz-line, .vt-fz-medline { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.vt-fz-name { flex: 1; min-width: 0; font-family: inherit; font-size: 13.5px; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; color: var(--ink); }
.vt-fz-val { width: 110px; flex: none; font-family: inherit; font-size: 13.5px; border: 1px solid var(--line); border-radius: 9px; padding: 9px 11px; text-align: right; color: var(--ink); }
.vt-fz-qtd { width: 64px; flex: none; font-family: inherit; font-size: 13.5px; border: 1px solid var(--line); border-radius: 9px; padding: 9px 10px; text-align: center; color: var(--ink); }
.vt-fz-name:focus, .vt-fz-val:focus, .vt-fz-qtd:focus { outline: none; border-color: var(--teal); }
.vt-fz-val:disabled { background: var(--line-2); color: var(--faint); }
.vt-fz-medtot { width: 92px; flex: none; text-align: right; font-weight: 700; font-size: 13px; color: var(--ink); }
.vt-fz-del { width: 28px; height: 28px; flex: none; border-radius: 8px; border: 1px solid var(--line); background: #fff; color: var(--muted); font-size: 17px; line-height: 1; }
.vt-fz-del:hover { border-color: var(--red); color: var(--red); background: var(--red-t); }
.vt-fz-add { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; color: var(--teal-d); border: 1px dashed #b8d9d6; background: var(--teal-t); border-radius: 9px; padding: 8px 12px; margin: 2px 0 4px; }
.vt-fz-add:hover { filter: brightness(.98); }
.vt-fz-resumo { background: var(--bg); border-radius: 11px; padding: 12px 14px; }
.vt-fz-resumo > div { display: flex; justify-content: space-between; align-items: center; font-size: 13.5px; padding: 4px 0; }
.vt-fz-resumo > div span { color: var(--muted); }
.vt-fz-resumo > div b { font-weight: 700; }
.vt-fz-total { border-top: 1px solid var(--line); margin-top: 6px; padding-top: 9px !important; }
.vt-fz-total span { font-weight: 800; color: var(--ink) !important; font-size: 15px !important; }
.vt-fz-total b { font-size: 19px !important; color: var(--green); }

/* histórico de meses (accordion) */
.vt-hist-mes { margin-bottom: 12px; overflow: hidden; }
.vt-hist-head { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 15px 18px; text-align: left; color: var(--ink); }
.vt-hist-head span b { font-weight: 800; font-size: 15px; }
.vt-hist-head:hover { background: var(--bg); }
.vt-hist-chev { color: var(--faint); transition: transform .18s; display: inline-flex; }
.vt-hist-chev.open { transform: rotate(90deg); }
.vt-hist-body { border-top: 1px solid var(--line); padding: 6px 10px 10px; }
.vt-hist-row { width: 100%; display: grid; grid-template-columns: 150px 1fr auto 18px; align-items: center; gap: 12px; padding: 10px 8px; border-radius: 9px; text-align: left; color: var(--ink); }
.vt-hist-row:hover { background: var(--teal-t); }
.vt-hist-date { font-size: 12.5px; color: var(--muted); font-weight: 600; }
.vt-hist-pat b { font-weight: 700; display: block; font-size: 13.5px; }
.vt-hist-pat i { font-style: normal; font-size: 12px; color: var(--muted); }
.vt-hist-val { font-weight: 700; font-size: 13.5px; color: var(--green); white-space: nowrap; }
.vt-hist-row .vt-ic { color: var(--faint); }

/* ===== Transferência de paciente (busca + criar novo) ===== */
.vt-xfer-modal { width: min(500px, 96vw); max-height: 92vh; overflow-y: auto; }
.vt-xfer-sec { font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .05em; color: var(--teal-d); margin: 16px 0 8px; }
.vt-xfer-chip { display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--teal-t); border: 1px solid #bfe6e2; border-radius: 10px; padding: 10px 13px; }
.vt-xfer-chip b { font-weight: 700; font-size: 14px; }
.vt-xfer-chip i { font-style: normal; color: var(--muted); font-size: 12.5px; }
.vt-xfer-list { max-height: 230px; overflow-y: auto; border: 1px solid var(--line); border-radius: 11px; padding: 5px; }
.vt-xfer-item { width: 100%; display: flex; align-items: center; gap: 11px; text-align: left; padding: 9px 10px; border-radius: 9px; color: var(--ink); }
.vt-xfer-item:hover { background: var(--bg); }
.vt-xfer-item b { font-weight: 700; font-size: 13.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vt-xfer-item i { font-style: normal; font-size: 12px; color: var(--muted); display: block; }
.vt-xfer-av { width: 32px; height: 32px; flex: none; border-radius: 9px; background: var(--teal); color: #fff; display: grid; place-items: center; font-weight: 800; font-size: 13px; }
.vt-xfer-new { width: 100%; display: flex; align-items: center; gap: 8px; justify-content: center; padding: 10px; margin-top: 4px; border-top: 1px dashed var(--line); color: var(--teal-d); font-weight: 700; font-size: 13px; }
.vt-xfer-new:hover { background: var(--teal-t); border-radius: 9px; }
.vt-xfer-create { background: var(--bg); border-radius: 11px; padding: 12px 13px; }

/* animais clicáveis na ficha do responsável */
.vt-owner-pet { cursor: pointer; }
.vt-owner-pet .vt-ic { color: var(--faint); justify-self: end; }
.vt-owner-pet:hover { background: var(--teal-t); }

/* integrações */
.vt-integ-status { font-size: 12.5px; font-weight: 700; color: var(--amber); background: var(--amber-t); padding: 4px 11px; border-radius: 999px; white-space: nowrap; }
.vt-integ-status.on { color: var(--green); background: var(--green-t); }
.vt-wa-var { background: var(--teal-t, #eaf6f5); color: var(--teal-d); padding: 1px 6px; border-radius: 5px; font-size: 11.5px; margin-right: 5px; display: inline-block; }
.vt-ical-steps { margin: 4px 0 14px; padding-left: 20px; font-size: 13px; color: var(--ink); line-height: 1.55; }
.vt-ical-steps li { margin-bottom: 5px; }
.vt-ical-steps code { background: var(--bg); padding: 1px 5px; border-radius: 4px; font-size: 12px; }
</style>
</head>
